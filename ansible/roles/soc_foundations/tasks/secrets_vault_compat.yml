---
# soc_foundations/tasks/secrets_vault_compat.yml
# Crée la structure de métadonnées compatible avec une migration future vers Vault/ESO.
#
# Deux ressources K8s créées :
#   1. ConfigMap soc-vault-config       → documente le backend de secrets actuel et les chemins SA
#      (non-sensible, lisible par les opérateurs pour la migration future)
#   2. Secret soc-foundations-registry  → registre des identités SA (logins, namespaces, noms de secrets)
#      NE contient PAS les API keys — seulement les métadonnées de localisation
#
# Idempotent : kubernetes.core.k8s avec state: present (merge semantics)

# --- Lire les métadonnées des Secrets SA créés (pour le registre) ---

- name: Vault compat - lire le Secret SA TheHive
  kubernetes.core.k8s_info:
    kubeconfig: "{{ soc_foundations_kubeconfig_path }}"
    kind: Secret
    namespace: "{{ soc_namespaces.thehive }}"
    name: "{{ soc_foundations_thehive_sa_secret_name }}"
  register: _sf_vc_th_secret
  no_log: true
  changed_when: false

- name: Vault compat - lire le Secret SA Cortex
  kubernetes.core.k8s_info:
    kubeconfig: "{{ soc_foundations_kubeconfig_path }}"
    kind: Secret
    namespace: "{{ soc_namespaces.cortex }}"
    name: "{{ soc_foundations_cortex_sa_secret_name }}"
  register: _sf_vc_cx_secret
  no_log: true
  changed_when: false

- name: Vault compat - lire le Secret SA MISP
  kubernetes.core.k8s_info:
    kubeconfig: "{{ soc_foundations_kubeconfig_path }}"
    kind: Secret
    namespace: "{{ soc_namespaces.misp }}"
    name: "{{ soc_foundations_misp_sa_secret_name }}"
  register: _sf_vc_misp_secret
  no_log: true
  changed_when: false

- name: Vault compat - lire le Secret SA Wazuh
  kubernetes.core.k8s_info:
    kubeconfig: "{{ soc_foundations_kubeconfig_path }}"
    kind: Secret
    namespace: "{{ soc_namespaces.wazuh }}"
    name: "{{ soc_foundations_wazuh_sa_secret_name }}"
  register: _sf_vc_wz_secret
  no_log: true
  changed_when: false

# --- ConfigMap vault-config ---

- name: Vault compat - créer/mettre à jour la ConfigMap soc-vault-config
  kubernetes.core.k8s:
    kubeconfig: "{{ soc_foundations_kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ soc_foundations_vault_configmap_name }}"
        namespace: "{{ soc_foundations_vault_configmap_namespace }}"
        labels:
          app.kubernetes.io/managed-by: soc-foundations
          soc.lab/component: vault-compat
        annotations:
          soc.lab/description: >-
            Configuration du backend de secrets SOC.
            En production, remplacer les K8s Secrets par HashiCorp Vault / External Secrets Operator.
          soc.lab/environment: "{{ soc_environment | default('dev') }}"
      data:
        vault_backend: "{{ soc_vault_backend | default('kubernetes-secrets') }}"
        vault_path_prefix: "soc/foundations"
        environment: "{{ soc_environment | default('dev') }}"
        rotation_policy: "manual"
        sa_thehive_ns: "{{ soc_namespaces.thehive }}"
        sa_thehive_secret: "{{ soc_foundations_thehive_sa_secret_name }}"
        sa_cortex_ns: "{{ soc_namespaces.cortex }}"
        sa_cortex_secret: "{{ soc_foundations_cortex_sa_secret_name }}"
        sa_misp_ns: "{{ soc_namespaces.misp }}"
        sa_misp_secret: "{{ soc_foundations_misp_sa_secret_name }}"
        sa_wazuh_ns: "{{ soc_namespaces.wazuh }}"
        sa_wazuh_secret: "{{ soc_foundations_wazuh_sa_secret_name }}"
        migration_guide: |
          Pour migrer vers HashiCorp Vault ou External Secrets Operator :
          1. Créer les politiques Vault pour chaque chemin de secret SA.
          2. Remplacer les K8s Secret par des ExternalSecret CRDs.
          3. Mettre à jour vault_backend : 'kubernetes-secrets' -> 'vault' ou 'eso'.
          4. Supprimer ce ConfigMap après migration (remplacé par la config Vault).

# --- Secret registre (métadonnées non-sensibles) ---

- name: Vault compat - construire les données du registre SA
  ansible.builtin.set_fact:
    _sf_vc_registry_data:
      thehive_sa_namespace: "{{ soc_namespaces.thehive }}"
      thehive_sa_secret: "{{ soc_foundations_thehive_sa_secret_name }}"
      thehive_sa_login: >-
        {{
          (
            (_sf_vc_th_secret.resources | default([]) | length > 0)
            and (soc_foundations_thehive_sa_secret_key_login in (_sf_vc_th_secret.resources[0].data | default({})))
          )
          | ternary(
              _sf_vc_th_secret.resources[0].data[soc_foundations_thehive_sa_secret_key_login] | b64decode,
              soc_foundations_thehive_sa_login
            )
        }}
      cortex_sa_namespace: "{{ soc_namespaces.cortex }}"
      cortex_sa_secret: "{{ soc_foundations_cortex_sa_secret_name }}"
      cortex_sa_login: >-
        {{
          (
            (_sf_vc_cx_secret.resources | default([]) | length > 0)
            and (soc_foundations_cortex_sa_secret_key_login in (_sf_vc_cx_secret.resources[0].data | default({})))
          )
          | ternary(
              _sf_vc_cx_secret.resources[0].data[soc_foundations_cortex_sa_secret_key_login] | b64decode,
              soc_foundations_cortex_sa_login
            )
        }}
      misp_sa_namespace: "{{ soc_namespaces.misp }}"
      misp_sa_secret: "{{ soc_foundations_misp_sa_secret_name }}"
      misp_sa_email: >-
        {{
          (
            (_sf_vc_misp_secret.resources | default([]) | length > 0)
            and (soc_foundations_misp_sa_secret_key_email in (_sf_vc_misp_secret.resources[0].data | default({})))
          )
          | ternary(
              _sf_vc_misp_secret.resources[0].data[soc_foundations_misp_sa_secret_key_email] | b64decode,
              soc_foundations_misp_sa_email
            )
        }}
      wazuh_sa_namespace: "{{ soc_namespaces.wazuh }}"
      wazuh_sa_secret: "{{ soc_foundations_wazuh_sa_secret_name }}"
      wazuh_sa_username: >-
        {{
          (
            (_sf_vc_wz_secret.resources | default([]) | length > 0)
            and (soc_foundations_wazuh_sa_secret_key_username in (_sf_vc_wz_secret.resources[0].data | default({})))
          )
          | ternary(
              _sf_vc_wz_secret.resources[0].data[soc_foundations_wazuh_sa_secret_key_username] | b64decode,
              soc_foundations_wazuh_sa_username
            )
        }}
  no_log: true

- name: Vault compat - créer/mettre à jour le Secret soc-foundations-registry
  kubernetes.core.k8s:
    kubeconfig: "{{ soc_foundations_kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ soc_foundations_registry_secret_name }}"
        namespace: "{{ soc_foundations_registry_secret_namespace }}"
        labels:
          app.kubernetes.io/managed-by: soc-foundations
          soc.lab/component: sa-registry
        annotations:
          soc.lab/description: >-
            Registre des identités de comptes de service SOC.
            Contient les logins/emails et les références aux Secrets — PAS les clés API elles-mêmes.
          soc.lab/environment: "{{ soc_environment | default('dev') }}"
      type: Opaque
      stringData: "{{ _sf_vc_registry_data }}"
  no_log: true

- name: Vault compat - rapport de statut
  ansible.builtin.debug:
    msg: >-
      Vault compat : ConfigMap '{{ soc_foundations_vault_configmap_name }}'
      et Secret '{{ soc_foundations_registry_secret_name }}'
      créés/mis à jour dans {{ soc_foundations_vault_configmap_namespace }}.
