---
# ════════════════════════════════════════════════════════════════════════════════
# credentials.yml — Créer le Secret agrégé soc-automation-worker-creds
# tag: integration
# ════════════════════════════════════════════════════════════════════════════════
#
# Regroupe les 4 clés SA (créées par 170-soc-foundations) dans un unique Secret
# Kubernetes que Shuffle SOAR monte comme variables d'environnement dans ses workers.
#
# Ce Secret remplace la précédente injection directe dans le CronJob Python (180 < v2).
# Il est également lu par 190-soc-risk-engine (service HTTP) pour son propre accès
# TheHive (lecture des CustomFields pour le scoring).
#
# Idempotence: marker ConfigMap soc_automation_marker_credentials

- name: "credentials | Set template version"
  ansible.builtin.set_fact:
    _cred_marker_version: "2026-03-21-use-foundations-for-write-key-v2"

# ── Check idempotence marker ──────────────────────────────────────

- name: "credentials | Check idempotence marker"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ soc_automation_kubeconfig_path }}"
    kind: ConfigMap
    namespace: "{{ soc_automation_worker_namespace }}"
    name: "{{ soc_automation_marker_credentials }}"
  register: _cred_marker
  changed_when: false

- name: "credentials | Check existing aggregated Secret"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ soc_automation_kubeconfig_path }}"
    kind: Secret
    namespace: "{{ soc_automation_worker_namespace }}"
    name: "{{ soc_automation_worker_creds_secret }}"
  register: _cred_existing_secret
  changed_when: false
  no_log: true

- name: "credentials | Invalidate marker when aggregated Secret is stale"
  when:
    - _cred_marker.resources | length > 0
    - >-
      (
        _cred_marker.resources[0].data.template_version | default('')
      ) != _cred_marker_version
      or
      (
        _cred_existing_secret.resources | length == 0
      )
      or
      (
        'THEHIVE_WRITE_KEY' not in (_cred_existing_secret.resources[0].data | default({}))
      )
  kubernetes.core.k8s:
    kubeconfig: "{{ soc_automation_kubeconfig_path }}"
    state: absent
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ soc_automation_marker_credentials }}"
        namespace: "{{ soc_automation_worker_namespace }}"
  changed_when: true

- name: "credentials | Re-check idempotence marker"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ soc_automation_kubeconfig_path }}"
    kind: ConfigMap
    namespace: "{{ soc_automation_worker_namespace }}"
    name: "{{ soc_automation_marker_credentials }}"
  register: _cred_marker
  changed_when: false

# ── Main block ────────────────────────────────────────────────────

- name: "credentials | Créer le Secret soc-automation-worker-creds"
  when: _cred_marker.resources | length == 0
  block:

    # Lire les 4 Secrets SA directement (indépendant des facts preflight)
    # pour être utilisable même avec --tags integration seul.

    - name: "credentials | Lire le Secret TheHive SA (read-only)"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ soc_automation_kubeconfig_path }}"
        kind: Secret
        namespace: "{{ soc_automation_thehive_sa_secret_ns }}"
        name: "{{ soc_automation_thehive_sa_secret_name }}"
      register: _cred_thehive_read
      no_log: true

    - name: "credentials | Lire le Secret TheHive write SA (org-admin)"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ soc_automation_kubeconfig_path }}"
        kind: Secret
        namespace: "{{ soc_automation_thehive_write_sa_secret_ns }}"
        name: "{{ soc_automation_thehive_write_sa_secret_name }}"
      register: _cred_thehive_write
      no_log: true

    - name: "credentials | Lire le Secret Cortex SA"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ soc_automation_kubeconfig_path }}"
        kind: Secret
        namespace: "{{ soc_automation_cortex_sa_secret_ns }}"
        name: "{{ soc_automation_cortex_sa_secret_name }}"
      register: _cred_cortex
      no_log: true

    - name: "credentials | Lire le Secret MISP SA"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ soc_automation_kubeconfig_path }}"
        kind: Secret
        namespace: "{{ soc_automation_misp_sa_secret_ns }}"
        name: "{{ soc_automation_misp_sa_secret_name }}"
      register: _cred_misp
      no_log: true

    - name: "credentials | Lire le Secret Wazuh SA"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ soc_automation_kubeconfig_path }}"
        kind: Secret
        namespace: "{{ soc_automation_wazuh_sa_secret_ns }}"
        name: "{{ soc_automation_wazuh_sa_secret_name }}"
      register: _cred_wazuh
      no_log: true

    - name: "credentials | Assert tous les Secrets SA sont présents"
      ansible.builtin.assert:
        that:
          - _cred_thehive_read.resources | length > 0
          - _cred_thehive_write.resources | length > 0
          - _cred_cortex.resources | length > 0
          - _cred_misp.resources | length > 0
          - _cred_wazuh.resources | length > 0
        fail_msg: >-
          Un ou plusieurs Secrets SA sont absents.
          Exécuter 170-soc-foundations.yml (--tags rbac) d'abord.

    - name: "credentials | Décoder les clés SA"
      ansible.builtin.set_fact:
        _cred_thehive_key:       "{{ _cred_thehive_read.resources[0].data[soc_automation_thehive_sa_key] | b64decode }}"
        _cred_thehive_write_key: "{{ _cred_thehive_write.resources[0].data[soc_automation_thehive_write_sa_key] | b64decode }}"
        _cred_cortex_key:        "{{ _cred_cortex.resources[0].data[soc_automation_cortex_sa_key] | b64decode }}"
        _cred_misp_key:          "{{ _cred_misp.resources[0].data[soc_automation_misp_sa_key] | b64decode }}"
        _cred_wazuh_user:        "{{ _cred_wazuh.resources[0].data[soc_automation_wazuh_sa_key_user] | b64decode }}"
        _cred_wazuh_pass:        "{{ _cred_wazuh.resources[0].data[soc_automation_wazuh_sa_key_pass] | b64decode }}"
      no_log: true

    - name: "credentials | Créer le Secret agrégé soc-automation-worker-creds"
      kubernetes.core.k8s:
        kubeconfig: "{{ soc_automation_kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          type: Opaque
          metadata:
            name: "{{ soc_automation_worker_creds_secret }}"
            namespace: "{{ soc_automation_worker_namespace }}"
            labels: "{{ soc_automation_labels }}"
            annotations:
              soc.lab/purpose: >-
                Credentials agrégés pour Shuffle SOAR et le service HTTP Risk Engine.
                Monté comme env vars dans les workers Shuffle et le Deployment 190.
          stringData:
            THEHIVE_URL:       "{{ soc_automation_thehive_api_base }}"
            THEHIVE_API_KEY:   "{{ _cred_thehive_key }}"
            THEHIVE_WRITE_KEY: "{{ _cred_thehive_write_key }}"
            CORTEX_URL:        "{{ soc_automation_cortex_api_base }}"
            CORTEX_API_KEY:    "{{ _cred_cortex_key }}"
            MISP_URL:          "{{ soc_automation_misp_api_base }}"
            MISP_API_KEY:      "{{ _cred_misp_key }}"
            WAZUH_USER:        "{{ _cred_wazuh_user }}"
            WAZUH_PASS:        "{{ _cred_wazuh_pass }}"
      no_log: true

    - name: "credentials | Créer le marker d'idempotence"
      kubernetes.core.k8s:
        kubeconfig: "{{ soc_automation_kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ soc_automation_marker_credentials }}"
            namespace: "{{ soc_automation_worker_namespace }}"
            labels: "{{ soc_automation_labels }}"
            annotations:
              soc.lab/feature:     "credentials"
              soc.lab/deployed-at: "{{ ansible_date_time.iso8601 | default('unknown') }}"
          data:
            feature:        "credentials"
            status:         "active"
            secret_name:    "{{ soc_automation_worker_creds_secret }}"
            environment:    "{{ soc_environment | default('dev') }}"
            template_version: "{{ _cred_marker_version }}"
