---
- name: Create smoke namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ playbook_dir }}/artifacts/admin.conf }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata: { name: smoke }

- name: Deploy echo-server + LB service
  kubernetes.core.k8s:
    kubeconfig: "{{ playbook_dir }}/artifacts/admin.conf }}"
    state: present
    definition: |
      apiVersion: apps/v1
      kind: Deployment
      metadata: { name: echo, namespace: smoke }
      spec:
        replicas: 1
        selector: { matchLabels: { app: echo } }
        template:
          metadata: { labels: { app: echo } }
          spec:
            containers:
              - name: echo
                image: ealen/echo-server:latest
                ports: [{ containerPort: 80 }]
      ---
      apiVersion: v1
      kind: Service
      metadata: { name: echo, namespace: smoke }
      spec:
        type: LoadBalancer
        selector: { app: echo }
        ports: [{ port: 80, targetPort: 80 }]
