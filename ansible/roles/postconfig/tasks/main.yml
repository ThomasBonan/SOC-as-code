---
- name: Create smoke namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: smoke
  delegate_to: localhost
  run_once: true
  become: false
  vars:
    ansible_python_interpreter: /opt/ansible-k8s-venv/bin/python

- name: Deploy echo-server + LB service
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition: |
      apiVersion: apps/v1
      kind: Deployment
      metadata: { name: echo, namespace: smoke }
      spec:
        replicas: 1
        selector: { matchLabels: { app: echo } }
        template:
          metadata: { labels: { app: echo } }
          spec:
            containers:
              - name: echo
                image: ealen/echo-server:0.9.2
                ports: [{ containerPort: 80 }]
                resources:
                  requests: { cpu: "10m", memory: "32Mi" }
                  limits: { cpu: "100m", memory: "64Mi" }
      ---
      apiVersion: v1
      kind: Service
      metadata: { name: echo, namespace: smoke }
      spec:
        type: LoadBalancer
        selector: { app: echo }
        ports: [{ port: 80, targetPort: 80 }]
  delegate_to: localhost
  run_once: true
  become: false
  vars:
    ansible_python_interpreter: /opt/ansible-k8s-venv/bin/python
