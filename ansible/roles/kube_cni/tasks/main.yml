---
- name: Add cilium helm repo
  ansible.builtin.command: helm repo add cilium https://helm.cilium.io/
  args:
    creates: /home/{{ bastion_user }}/.cache/helm/repository/cilium-index.yaml
  delegate_to: localhost
  become: false

- name: Update helm repos
  ansible.builtin.command: helm repo update
  delegate_to: localhost
  become: false

- name: Install/Upgrade Cilium
  ansible.builtin.command: >
    helm upgrade --install cilium cilium/cilium
    --namespace kube-system
    --version {{ cilium_version }}
    --set kubeProxyReplacement={{ cilium_kubeproxy_replacement }}
    --set routingMode={{ cilium_routing_mode }}
    --set hubble.enabled={{ cilium_hubble_enabled | bool | lower }}
    --set hubble.relay.enabled={{ (cilium_hubble_ui or cilium_hubble_enabled) | bool | lower }}
    --set hubble.ui.enabled={{ cilium_hubble_ui | bool | lower }}
    --set prometheus.enabled={{ cilium_prometheus_enabled | bool | lower }}
    --set ipam.mode=kubernetes
    --set hubble.relay.tolerations[0].key=node-role.kubernetes.io/control-plane
    --set hubble.relay.tolerations[0].operator=Exists
    --set hubble.relay.tolerations[0].effect=NoSchedule
    --set hubble.ui.tolerations[0].key=node-role.kubernetes.io/control-plane
    --set hubble.ui.tolerations[0].operator=Exists
    --set hubble.ui.tolerations[0].effect=NoSchedule
    --set operator.replicas=1
  environment:
    KUBECONFIG: "{{ playbook_dir }}/artifacts/admin.conf"
  delegate_to: localhost
  become: false

- name: Wait for cilium rollout
  ansible.builtin.command: kubectl -n kube-system rollout status ds/cilium --timeout=300s
  environment:
    KUBECONFIG: "{{ playbook_dir }}/artifacts/admin.conf"
  delegate_to: localhost
  become: false

- name: Wait for hubble relay rollout
  ansible.builtin.command: kubectl -n kube-system rollout status deploy/hubble-relay --timeout=300s
  environment:
    KUBECONFIG: "{{ playbook_dir }}/artifacts/admin.conf"
  delegate_to: localhost
  become: false

- name: Wait for coredns rollout
  ansible.builtin.command: kubectl -n kube-system rollout status deploy/coredns --timeout=300s
  environment:
    KUBECONFIG: "{{ playbook_dir }}/artifacts/admin.conf"
  delegate_to: localhost
  become: false

- name: Fail fast if kubeconfig missing
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: adminconf

- name: Stop if control-plane not initialized
  ansible.builtin.fail:
    msg: "/etc/kubernetes/admin.conf not found. Run 20-control-plane.yml first."
  when: not adminconf.stat.exists

