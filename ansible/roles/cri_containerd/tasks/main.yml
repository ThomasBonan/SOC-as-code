---
- name: Install containerd
  ansible.builtin.apt:
    name: containerd
    state: present
    update_cache: yes

- name: Ensure /etc/containerd exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Write containerd config (systemd cgroup)
  ansible.builtin.copy:
    dest: /etc/containerd/config.toml
    mode: "0644"
    content: "{{ lookup('template', 'config.toml.j2') }}"
  notify: restart-containerd

- name: Enable & start containerd
  ansible.builtin.service:
    name: containerd
    state: started
    enabled: true
