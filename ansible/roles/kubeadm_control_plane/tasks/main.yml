---
- name: Render kubeadm config on master
  ansible.builtin.template:
    src: "kubeadm-config.yaml.j2"
    dest: "/tmp/kubeadm-config.yaml"
    mode: "0644"

- name: Pre-pull kube images
  ansible.builtin.command: >
    kubeadm config images pull
    --kubernetes-version {{ kubernetes_version }}
  register: pull
  changed_when: "'already present' not in pull.stdout"

- name: kubeadm init
  ansible.builtin.command: >
    kubeadm init --config /tmp/kubeadm-config.yaml --upload-certs
  args:
    creates: /etc/kubernetes/admin.conf
  register: init

- name: Prepare kubeconfig for ubuntu
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"

- name: Copy admin.conf to user kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Fetch admin.conf to bastion
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/artifacts/admin.conf"
    flat: true

- name: Generate join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_cmd

- name: Expose join command to inventory
  ansible.builtin.set_fact:
    kube_join_cmd: "{{ join_cmd.stdout }}"
  run_once: true
