---
- name: Install python venv + pip (bastion)
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
    state: present
    update_cache: true
  delegate_to: localhost
  run_once: true
  become: true

- name: Create venv for ansible k8s modules (bastion)
  ansible.builtin.command: python3 -m venv /opt/ansible-k8s-venv
  args:
    creates: /opt/ansible-k8s-venv/bin/python
  delegate_to: localhost
  run_once: true
  become: true

- name: Install kubernetes python client in venv (bastion)
  ansible.builtin.pip:
    name:
      - kubernetes>=26.1.0
      - PyYAML
      - requests
    virtualenv: /opt/ansible-k8s-venv
  delegate_to: localhost
  run_once: true
  become: true

- name: Add metallb repo (once)
  kubernetes.core.helm_repository:
    name: metallb
    repo_url: https://metallb.github.io/metallb
    binary_path: "{{ helm_binary_path }}"
  delegate_to: localhost
  run_once: true

- name: Install/upgrade metallb
  kubernetes.core.helm:
    name: metallb
    chart_ref: metallb/metallb
    chart_version: "{{ metallb_version }}"
    release_namespace: "{{ metallb_namespace }}"
    create_namespace: true
    kubeconfig: "{{ kubeconfig_path }}"
    wait: true
    timeout: "10m0s"
    update_repo_cache: true
    binary_path: "{{ helm_binary_path }}"
    # skip_crds: false  # (optionnel, mais explicite)
  delegate_to: localhost
  run_once: true
  become: false

- name: Wait for MetalLB CRDs to be established
  ansible.builtin.command: >
    kubectl --kubeconfig {{ kubeconfig_path }}
    wait --for=condition=Established --timeout=120s
    crd/bgppeers.metallb.io
    crd/ipaddresspools.metallb.io
    crd/bgpadvertisements.metallb.io
  register: crd_wait
  retries: 10
  delay: 3
  until: crd_wait.rc == 0
  delegate_to: localhost
  run_once: true
  become: false

# --- BGP CONFIG ---

- name: Create IPAddressPool (BGP)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: "{{ metallb_pool_name }}"
        namespace: "{{ metallb_namespace }}"
      spec:
        addresses:
          - "{{ metallb_ip_range }}"
  delegate_to: localhost
  run_once: true
  become: false
  vars:
    ansible_python_interpreter: /opt/ansible-k8s-venv/bin/python

- name: Create BGPPeer (OPNsense)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: metallb.io/v1beta2
      kind: BGPPeer
      metadata:
        name: "{{ metallb_bgp_peer_name }}"
        namespace: "{{ metallb_namespace }}"
      spec:
        myASN: "{{ metallb_my_asn | int }}"
        peerASN: "{{ metallb_router_asn | int }}"
        peerAddress: "{{ metallb_router_ip }}"
        peerPort: "{{ metallb_peer_port | int }}"
        holdTime: "{{ metallb_hold_time }}"
        keepaliveTime: "{{ metallb_keepalive_time }}"
  delegate_to: localhost
  run_once: true
  become: false
  vars:
    ansible_python_interpreter: /opt/ansible-k8s-venv/bin/python

- name: Create BGPAdvertisement
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: metallb.io/v1beta1
      kind: BGPAdvertisement
      metadata:
        name: "{{ metallb_bgp_adv_name }}"
        namespace: "{{ metallb_namespace }}"
      spec:
        ipAddressPools:
          - "{{ metallb_pool_name }}"
        aggregationLength: 32
        localPref: 100
        communities: "{{ metallb_communities }}"
  delegate_to: localhost
  run_once: true
  become: false
  vars:
    ansible_python_interpreter: /opt/ansible-k8s-venv/bin/python

- name: List all pods in metallb namespace
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    api_version: v1
    kind: Pod
    namespace: "{{ metallb_namespace }}"
  register: metallb_pods
  delegate_to: localhost
  run_once: true
  vars:
    ansible_python_interpreter: /opt/ansible-k8s-venv/bin/python

- name: Select speaker pods by name prefix
  ansible.builtin.set_fact:
    metallb_speaker_pods: >-
      {{
        metallb_pods.resources
        | selectattr('metadata.name', 'match', '^metallb-speaker-')
        | list
      }}
  delegate_to: localhost
  run_once: true

- name: Fail if no speaker pod found
  ansible.builtin.fail:
    msg: "No MetalLB speaker pod found in {{ metallb_namespace }} (expected name prefix metallb-speaker-)."
  when: (metallb_speaker_pods | length) == 0
  delegate_to: localhost
  run_once: true

- name: Check BGP summary on one speaker (quick)
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_path }}"
      - -n
      - "{{ metallb_namespace }}"
      - exec
      - -i
      - "{{ metallb_speaker_pods[0].metadata.name }}"
      - -c
      - frr
      - --
      - vtysh
      - -c
      - "show bgp ipv4 unicast summary"
  register: bgp_summary
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Show BGP summary
  ansible.builtin.debug:
    var: bgp_summary.stdout_lines
  changed_when: false
  delegate_to: localhost
  run_once: true