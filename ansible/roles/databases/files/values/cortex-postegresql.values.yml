auth:
  username: cortex
  database: cortexdb
  existingSecret: cortex-postgresql-auth
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: password

primary:
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

metrics:
  enabled: false
