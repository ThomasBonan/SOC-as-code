auth:
  username: cortex
  database: cortexdb
  existingSecret: cortex-postgresql-auth
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: password

image:
  registry: docker.io
  repository: bitnamilegacy/postgresql
  tag: 16.4.0-debian-12-r14

primary:
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

metrics:
  enabled: false
