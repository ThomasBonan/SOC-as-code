auth:
  username: misp
  database: misp
  existingSecret: misp-mariadb-auth
  secretKeys:
    mariadbRootPasswordKey: mariadb-root-password
    mariadbPasswordKey: mariadb-password

image:
  registry: docker.io
  repository: bitnamilegacy/mariadb
  tag: "12.0.2-debian-12-r0"

primary:
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

global:
  security:
    allowInsecureImages: true