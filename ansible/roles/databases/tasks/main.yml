---
- name: Add Bitnami repo (once)
  kubernetes.core.helm_repository:
    name: "{{ bitnami_repo_name }}"
    repo_url: "{{ bitnami_repo_url }}"
    binary_path: "{{ helm_binary_path }}"
  delegate_to: localhost
  run_once: true
  become: false

- name: Update helm repos (once)
  ansible.builtin.command: "{{ helm_binary_path }} repo update"
  delegate_to: localhost
  run_once: true
  become: false

- block:
    - name: Ensure namespace exists
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ soc_core_namespace }}"

    # -------------------------
    # TheHive PostgreSQL secret
    # -------------------------
    - name: Check TheHive PostgreSQL secret exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: v1
        kind: Secret
        name: thehive-postgresql-auth
        namespace: "{{ soc_core_namespace }}"
      register: thehive_pg_secret
      vars:
        ansible_python_interpreter: "{{ k8s_ansible_python }}"

    - name: Create TheHive PostgreSQL secret (create-once)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: thehive-postgresql-auth
            namespace: "{{ soc_core_namespace }}"
          type: Opaque
          stringData:
            postgres-password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
            password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      when:
        - (thehive_pg_secret.resources | length) == 0
        - soc_vault_backend | default('kubernetes-secrets') == 'kubernetes-secrets'

    # -------------------------
    # Cortex PostgreSQL secret
    # -------------------------
    - name: Check Cortex PostgreSQL secret exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: v1
        kind: Secret
        name: cortex-postgresql-auth
        namespace: "{{ soc_core_namespace }}"
      register: cortex_pg_secret
      vars:
        ansible_python_interpreter: "{{ k8s_ansible_python }}"

    - name: Create Cortex PostgreSQL secret (create-once)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cortex-postgresql-auth
            namespace: "{{ soc_core_namespace }}"
          type: Opaque
          stringData:
            postgres-password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
            password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      when:
        - (cortex_pg_secret.resources | length) == 0
        - soc_vault_backend | default('kubernetes-secrets') == 'kubernetes-secrets'

    # -------------------------
    # MISP MariaDB secret
    # -------------------------
    - name: Check MISP MariaDB secret exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: v1
        kind: Secret
        name: misp-mariadb-auth
        namespace: "{{ soc_core_namespace }}"
      register: misp_mariadb_secret
      vars:
        ansible_python_interpreter: "{{ k8s_ansible_python }}"

    - name: Create MISP MariaDB secret (create-once)
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: misp-mariadb-auth
            namespace: "{{ soc_core_namespace }}"
          type: Opaque
          stringData:
            mariadb-root-password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
            mariadb-password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      when:
        - (misp_mariadb_secret.resources | length) == 0
        - soc_vault_backend | default('kubernetes-secrets') == 'kubernetes-secrets'

  delegate_to: localhost
  run_once: true
  become: false
  vars:
    ansible_python_interpreter: "{{ k8s_ansible_python }}"

# --- DB Deployments ---
- name: Check Longhorn system is healthy before DBs
  ansible.builtin.command: >
    kubectl --kubeconfig {{ kubeconfig_path }} -n longhorn-system get pods
  register: lh_pods
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Fail if Longhorn managers are not Running
  ansible.builtin.fail:
    msg: "Longhorn not healthy:\n{{ lh_pods.stdout }}"
  when: "'longhorn-manager' in lh_pods.stdout and 'Running' not in lh_pods.stdout"
  delegate_to: localhost
  run_once: true

- name: Deploy TheHive PostgreSQL
  kubernetes.core.helm:
    name: thehive-postgresql
    chart_ref: bitnami/postgresql
    chart_version: "{{ postgres_chart_version }}"
    release_namespace: "{{ soc_core_namespace }}"
    create_namespace: true
    kubeconfig: "{{ kubeconfig_path }}"
    values_files:
      - "{{ role_path }}/files/values/thehive-postgresql.values.yml"
    wait: true
    atomic: true
    timeout: "30m0s"
    binary_path: "{{ helm_binary_path }}"
  delegate_to: localhost
  run_once: true

- name: Wait for TheHive PostgreSQL pod to be Ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    kind: Pod
    namespace: "{{ soc_core_namespace }}"
    label_selectors:
      - "app.kubernetes.io/instance=thehive-postgresql"
  register: thehive_pg_pods
  delegate_to: localhost
  run_once: true
  become: false
  vars:
    ansible_python_interpreter: "{{ k8s_ansible_python }}"

- name: Fail if TheHive PostgreSQL pod not Ready
  ansible.builtin.fail:
    msg: "TheHive PostgreSQL pods not ready: {{ thehive_pg_pods.resources | map(attribute='status.phase') | list }}"
  when: >
    (thehive_pg_pods.resources | length) == 0 or
    (thehive_pg_pods.resources | selectattr('status.containerStatuses', 'defined') | list | length) == 0 or
    (thehive_pg_pods.resources | selectattr('status.containerStatuses', 'defined')
       | map(attribute='status.containerStatuses') | list | first
       | selectattr('ready','equalto',true) | list | length) == 0

- name: Deploy Cortex PostgreSQL
  kubernetes.core.helm:
    name: "{{ cortex_pg_release }}"
    chart_ref: "{{ postgres_chart_ref }}"
    chart_version: "{{ postgres_chart_version }}"
    release_namespace: "{{ soc_core_namespace }}"
    create_namespace: false
    kubeconfig: "{{ kubeconfig_path }}"
    values_files:
      - "{{ role_path }}/files/values/cortex-postgresql.values.yml"
    wait: true
    atomic: true
    timeout: "30m0s"
    binary_path: "{{ helm_binary_path }}"
  delegate_to: localhost
  run_once: true
  become: false

- name: Deploy MISP MariaDB
  kubernetes.core.helm:
    name: "{{ misp_db_release }}"
    chart_ref: "{{ mariadb_chart_ref }}"
    chart_version: "{{ mariadb_chart_version }}"
    release_namespace: "{{ soc_core_namespace }}"
    create_namespace: false
    kubeconfig: "{{ kubeconfig_path }}"
    values_files:
      - "{{ role_path }}/files/values/misp-mariadb.values.yml"
    wait: true
    atomic: true
    timeout: "30m0s"
    binary_path: "{{ helm_binary_path }}"
  delegate_to: localhost
  run_once: true
  become: false

