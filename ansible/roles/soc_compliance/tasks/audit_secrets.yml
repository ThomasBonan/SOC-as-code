- name: "audit_secrets | Evaluate MISP SA secret completeness"
  ansible.builtin.set_fact:
    _sec_misp_ok: >-
      {{
        _sec_misp.resources | length > 0
        and soc_compliance_misp_sa_key in (_sec_misp.resources[0].data | default({}))
        and (_sec_misp.resources[0].data[soc_compliance_misp_sa_key] | default('') | length) > 0
