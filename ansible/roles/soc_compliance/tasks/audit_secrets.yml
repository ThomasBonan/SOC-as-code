---
# ════════════════════════════════════════════════════════════════════════════════
# audit_secrets.yml — Audit K8s Secrets existence and key completeness
# tag: audit
# ════════════════════════════════════════════════════════════════════════════════
#
# IMPORTANT: Secret values are NEVER displayed or logged.
# Audit checks only: secret exists, expected keys present, keys are non-empty.
#
# Secrets audited:
#   thehive-sa-foundations  (ns: soc-thehive) — key: api_key
#   cortex-sa-foundations   (ns: soc-cortex)  — key: api_key
#   misp-sa-foundations     (ns: soc-core)    — key: authkey
#   wazuh-sa-foundations    (ns: soc-wazuh)   — keys: username, password
#   soc-automation-worker-creds (ns: soc-thehive) — min 2 keys
#
# All tasks are read-only (changed_when: false). no_log: true on all secret reads.
# Findings accumulate in _sec_findings[] and are exposed via _comp_sec_result.

# ── Initialize audit state ────────────────────────────────────────

- name: "audit_secrets | Initialize secrets audit state"
  ansible.builtin.set_fact:
    _sec_findings: []
    _sec_status:   "ok"
  changed_when: false

# ── TheHive SA Secret ─────────────────────────────────────────────

- name: "audit_secrets | Read TheHive SA secret"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ soc_compliance_kubeconfig_path }}"
    kind: Secret
    namespace: "{{ soc_compliance_thehive_sa_secret_ns }}"
    name: "{{ soc_compliance_thehive_sa_secret_name }}"
  register: _sec_thehive
  no_log: true
  changed_when: false

- name: "audit_secrets | Evaluate TheHive SA secret completeness"
  ansible.builtin.set_fact:
    _sec_thehive_ok: >-
      {{
        _sec_thehive.resources | length > 0
        and soc_compliance_thehive_sa_key in (_sec_thehive.resources[0].data | default({}))
        and (_sec_thehive.resources[0].data[soc_compliance_thehive_sa_key] | default('') | length) > 0
      }}
  no_log: true
  changed_when: false

- name: "audit_secrets | DRIFT — TheHive SA secret missing or api_key empty"
  ansible.builtin.set_fact:
    _sec_status: "drift"
    _sec_findings: >-
      {{ _sec_findings + [
        {
          'type': 'secret_incomplete',
          'component': 'thehive_sa',
          'severity': 'critical',
          'secret': soc_compliance_thehive_sa_secret_name,
          'namespace': soc_compliance_thehive_sa_secret_ns,
          'missing_key': soc_compliance_thehive_sa_key,
          'message': 'TheHive SA secret missing or api_key is empty — re-run 170-soc-foundations (--tags rbac)'
        }
      ] }}
  when: not (_sec_thehive_ok | bool)
  changed_when: false

# ── Cortex SA Secret ──────────────────────────────────────────────

- name: "audit_secrets | Read Cortex SA secret"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ soc_compliance_kubeconfig_path }}"
    kind: Secret
    namespace: "{{ soc_compliance_cortex_sa_secret_ns }}"
    name: "{{ soc_compliance_cortex_sa_secret_name }}"
  register: _sec_cortex
  no_log: true
  changed_when: false

- name: "audit_secrets | Evaluate Cortex SA secret completeness"
  ansible.builtin.set_fact:
    _sec_cortex_ok: >-
      {{
        _sec_cortex.resources | length > 0
        and soc_compliance_cortex_sa_key in (_sec_cortex.resources[0].data | default({}))
        and (_sec_cortex.resources[0].data[soc_compliance_cortex_sa_key] | default('') | length) > 0
      }}
  no_log: true
  changed_when: false

- name: "audit_secrets | DRIFT — Cortex SA secret missing or api_key empty"
  ansible.builtin.set_fact:
    _sec_status: "{{ 'drift' if _sec_status == 'ok' else _sec_status }}"
    _sec_findings: >-
      {{ _sec_findings + [
        {
          'type': 'secret_incomplete',
          'component': 'cortex_sa',
          'severity': 'critical',
          'secret': soc_compliance_cortex_sa_secret_name,
          'namespace': soc_compliance_cortex_sa_secret_ns,
          'missing_key': soc_compliance_cortex_sa_key,
          'message': 'Cortex SA secret missing or api_key is empty — re-run 170-soc-foundations (--tags rbac)'
        }
      ] }}
  when: not (_sec_cortex_ok | bool)
  changed_when: false

