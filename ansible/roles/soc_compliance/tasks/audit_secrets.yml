    name: "{{ soc_compliance_wazuh_sa_secret_name }}"
  register: _sec_wazuh
  no_log: true
  changed_when: false

- name: "audit_secrets | Evaluate Wazuh SA secret completeness"
  ansible.builtin.set_fact:
    _sec_wazuh_ok: >-
      {{
        _sec_wazuh.resources | length > 0
        and soc_compliance_wazuh_sa_key_user in (_sec_wazuh.resources[0].data | default({}))
        and soc_compliance_wazuh_sa_key_pass in (_sec_wazuh.resources[0].data | default({}))
        and (_sec_wazuh.resources[0].data[soc_compliance_wazuh_sa_key_user] | default('') | length) > 0
        and (_sec_wazuh.resources[0].data[soc_compliance_wazuh_sa_key_pass] | default('') | length) > 0
      }}
  no_log: true
  changed_when: false

- name: "audit_secrets | DRIFT — Wazuh SA secret missing or credentials empty"
  ansible.builtin.set_fact:
    _sec_status: "{{ 'drift' if _sec_status == 'ok' else _sec_status }}"
    _sec_findings: >-
      {{ _sec_findings + [
        {
          'type': 'secret_incomplete',
          'component': 'wazuh_sa',
          'severity': 'critical',
          'secret': soc_compliance_wazuh_sa_secret_name,
          'namespace': soc_compliance_wazuh_sa_secret_ns,
          'missing_keys': [soc_compliance_wazuh_sa_key_user, soc_compliance_wazuh_sa_key_pass],
          'message': 'Wazuh SA secret missing or username/password empty — re-run 170-soc-foundations (--tags rbac)'
        }
      ] }}
  when: not (_sec_wazuh_ok | bool)
  changed_when: false

# ── Worker Credentials Secret (180) ──────────────────────────────

- name: "audit_secrets | Read worker credentials Secret"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ soc_compliance_kubeconfig_path }}"
    kind: Secret
    namespace: "{{ soc_namespaces.thehive }}"
    name: "{{ soc_compliance_secret_worker_creds }}"
  register: _sec_worker_creds
  no_log: true
  changed_when: false

- name: "audit_secrets | Evaluate worker credentials Secret completeness"
  ansible.builtin.set_fact:
    _sec_worker_creds_ok: >-
      {{
        _sec_worker_creds.resources | length > 0
        and (_sec_worker_creds.resources[0].data | default({}) | length) >= 2
      }}
  no_log: true
  changed_when: false

- name: "audit_secrets | DRIFT — worker creds Secret missing or has fewer than 2 keys"
  ansible.builtin.set_fact:
    _sec_status: "{{ 'drift' if _sec_status == 'ok' else _sec_status }}"
    _sec_findings: >-
      {{ _sec_findings + [
        {
          'type': 'secret_incomplete',
          'component': 'worker_creds',
          'severity': 'critical',
          'secret': soc_compliance_secret_worker_creds,
          'namespace': soc_namespaces.thehive,
          'message': 'Worker credentials Secret missing or has fewer than 2 keys — re-run 180-soc-automation'
        }
      ] }}
  when: not (_sec_worker_creds_ok | bool)
  changed_when: false

# ── Summary ───────────────────────────────────────────────────────

- name: "audit_secrets | Secrets audit summary"
  ansible.builtin.debug:
    msg:
      - "=== Secrets Audit Summary ==="
      - "Status          : {{ _sec_status | upper }}"
      - "TheHive SA      : {{ 'OK' if (_sec_thehive_ok     | bool) else 'DRIFT' }}"
      - "Cortex SA       : {{ 'OK' if (_sec_cortex_ok      | bool) else 'DRIFT' }}"
      - "MISP SA         : {{ 'OK' if (_sec_misp_ok        | bool) else 'DRIFT' }}"
      - "Wazuh SA        : {{ 'OK' if (_sec_wazuh_ok       | bool) else 'DRIFT' }}"
      - "Worker creds    : {{ 'OK' if (_sec_worker_creds_ok | bool) else 'DRIFT' }}"
      - "Total findings  : {{ _sec_findings | length }}"
  changed_when: false

# ── Expose results for report.yml ────────────────────────────────

- name: "audit_secrets | Expose results for report"
  ansible.builtin.set_fact:
    _comp_sec_result:
      status:       "{{ _sec_status }}"
      thehive_sa:   "{{ 'ok' if (_sec_thehive_ok      | bool) else 'drift' }}"
      cortex_sa:    "{{ 'ok' if (_sec_cortex_ok       | bool) else 'drift' }}"
      misp_sa:      "{{ 'ok' if (_sec_misp_ok         | bool) else 'drift' }}"
      wazuh_sa:     "{{ 'ok' if (_sec_wazuh_ok        | bool) else 'drift' }}"
      worker_creds: "{{ 'ok' if (_sec_worker_creds_ok | bool) else 'drift' }}"
      findings:     "{{ _sec_findings }}"
  changed_when: false
