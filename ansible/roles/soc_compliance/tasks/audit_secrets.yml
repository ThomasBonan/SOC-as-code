# ── Wazuh SA Secret ───────────────────────────────────────────────

- name: "audit_secrets | Read Wazuh SA secret"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ soc_compliance_kubeconfig_path }}"
    kind: Secret
