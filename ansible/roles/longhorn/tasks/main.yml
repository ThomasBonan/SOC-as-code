---
# --- Helm install (bastion)
- name: Add longhorn helm repo (once)
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: https://charts.longhorn.io
    binary_path: "{{ helm_binary_path }}"
  delegate_to: localhost
  run_once: true

- name: Update helm repos (once)
  ansible.builtin.command: "{{ helm_binary_path }} repo update"
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Ensure longhorn namespace exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ longhorn_namespace }}"
  delegate_to: localhost
  run_once: true
  vars:
    ansible_python_interpreter: /opt/ansible-k8s-venv/bin/python

- name: Install/upgrade Longhorn
  kubernetes.core.helm:
    name: "{{ longhorn_release }}"
    chart_ref: longhorn/longhorn
    chart_version: "{{ longhorn_chart_version | default(omit) }}"
    release_namespace: "{{ longhorn_namespace }}"
    create_namespace: false
    kubeconfig: "{{ kubeconfig_path }}"
    wait: true
    timeout: "15m0s"
    binary_path: "{{ helm_binary_path }}"
    values:
      defaultSettings:
        defaultReplicaCount: 1
      persistence:
        defaultClass: true
        defaultClassReplicaCount: 1
  delegate_to: localhost
  run_once: true

- name: Set Longhorn storageclass as default
  when: longhorn_set_default_sc | bool
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: patched
    kind: StorageClass
    api_version: storage.k8s.io/v1
    name: longhorn
    definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
  delegate_to: localhost
  run_once: true
  vars:
    ansible_python_interpreter: /opt/ansible-k8s-venv/bin/python
