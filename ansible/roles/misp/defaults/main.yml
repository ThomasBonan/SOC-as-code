---
# Namespace
soc_core_namespace: soc-core

# Helm
helm_binary_path: "helm"

# Ingress
misp_fqdn: "{{ (soc_services.misp | default('misp')) ~ '.' ~ (apps_domain | default('apps.soc.lab')) }}"

# Images (OFFICIELLES MISP - GHCR)
misp_core_image: "ghcr.io/misp/misp-docker/misp-core:76d1263"
misp_modules_image: "ghcr.io/misp/misp-docker/misp-modules:76d1263"

# Ports
misp_container_port: 80          # MISP core écoute généralement sur 80 dans ces images
misp_service_port: 80

misp_modules_container_port: 6666
misp_modules_service_port: 6666

# DB / Redis endpoints internes k8s
misp_db_host: "misp-mariadb.soc-core.svc.cluster.local"
misp_db_user: "misp"
misp_db_name: "misp"

misp_redis_host: "misp-redis-master.soc-core.svc.cluster.local"
misp_redis_port: 6379

# Modules URL (service k8s)
misp_modules_fqdn: "http://misp-modules"

# Workers tuning (MISP docker official)
misp_workers: "1"               # legacy
misp_num_workers_default: "5"
misp_num_workers_prio: "5"
misp_num_workers_email: "5"
misp_num_workers_update: "1"
misp_num_workers_cache: "5"

# SMTP
misp_smtp_port: "25"

# imagePullSecrets (laisser vide pour GHCR public)
misp_image_pull_secrets: []

# Redis via Helm (inchangé chez toi)
bitnami_repo_name: "bitnami"
bitnami_repo_url: "https://charts.bitnami.com/bitnami"
misp_redis_release: "misp-redis"
redis_chart_ref: "bitnami/redis"
redis_chart_version: "20.6.2"

misp_redis_image_registry: "docker.io"
misp_redis_image_repository: "bitnami/redis"
misp_redis_image_tag: "8.6.2"

# ============================================================
# GitOps gating — Phase 5
# Passer à "ansible" pour redéploiement complet sans ArgoCD opérationnel.
# Remettre à "gitops" après synchronisation ArgoCD.
# ============================================================
misp_config_managed_by: "gitops"    # ConfigMap misp-config
misp_ingress_managed_by: "gitops"   # Ingress misp.apps.soc.lab
