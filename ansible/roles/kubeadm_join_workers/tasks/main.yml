---
# Installe Cilium via Helm depuis le bastion (kubeconfig rapatrié)
- name: Ensure kubernetes.core & community.kubernetes present (sanity)
  ansible.builtin.debug:
    msg: "Using kubeconfig {{ playbook_dir }}/artifacts/admin.conf to install Cilium"

- name: Add Cilium repo
  community.kubernetes.helm_repository:
    name: cilium
    repo_url: https://helm.cilium.io
  delegate_to: localhost

- name: Install/upgrade Cilium
  community.kubernetes.helm:
    name: cilium
    chart_ref: cilium/cilium
    chart_version: "1.15.6"
    release_namespace: kube-system
    kubeconfig: "{{ playbook_dir }}/artifacts/admin.conf }}"
    values:
      kubeProxyReplacement: "strict"
      k8sServiceHost: "{{ hostvars[groups['master'][0]].ansible_host }}"
      k8sServicePort: 6443
  delegate_to: localhost

- name: Wait for Cilium DS ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ playbook_dir }}/artifacts/admin.conf }}"
    api_version: apps/v1
    kind: DaemonSet
    name: cilium
    namespace: kube-system
  register: ds
  until: ds.resources and ds.resources[0].status.numberReady == ds.resources[0].status.desiredNumberScheduled
  retries: 30
  delay: 10
  delegate_to: localhost
