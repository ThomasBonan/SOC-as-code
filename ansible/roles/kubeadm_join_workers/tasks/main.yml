---
- name: Check join command artifact exists (on bastion)
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/artifacts/join-command.sh"
  register: join_artifact
  delegate_to: localhost
  run_once: true
  become: false

- name: Fail if join command artifact missing
  ansible.builtin.fail:
    msg: "Missing artifacts/join-command.sh. Run playbooks/20-control-plane.yml first."
  when: not join_artifact.stat.exists
  delegate_to: localhost
  run_once: true
  become: false

- name: Read join command artifact
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/artifacts/join-command.sh"
  register: joinfile
  delegate_to: localhost
  run_once: true
  become: false

- name: Set join command fact
  ansible.builtin.set_fact:
    kube_join_cmd: "{{ joinfile.content | b64decode | trim }}"

- name: Join worker to cluster
  ansible.builtin.command: "{{ kube_join_cmd }}"
  args:
    creates: /etc/kubernetes/kubelet.conf
