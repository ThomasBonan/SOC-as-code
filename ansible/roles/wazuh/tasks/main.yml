---
# roles/wazuh/tasks/main.yml
# Déploiement Wazuh en 3 phases (Indexer -> Manager -> Dashboard) pour isoler le composant qui bloque.
# Stratégie:
# - Helm sans wait/atomic (on garde les objets même si ça coince)
# - Attente via kubectl rollout status sur tous les workloads (deploy/sts/ds) du namespace
# - Diagnostics automatiques (pods/pvc/events/describe/logs) en cas d'échec

- name: Ensure local secrets dir exists (controller)
  ansible.builtin.file:
    path: "{{ secrets_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  run_once: true
  when: soc_vault_backend | default('kubernetes-secrets') == 'kubernetes-secrets'

- name: Add Wazuh Helm repo (once)
  kubernetes.core.helm_repository:
    name: "{{ wazuh_helm_repo_name }}"
    repo_url: "{{ wazuh_helm_repo_url }}"
    binary_path: "{{ helm_binary_path }}"
  delegate_to: localhost
  run_once: true
  become: false

- name: Update Helm repos (once)
  ansible.builtin.command: "{{ helm_binary_path }} repo update"
  delegate_to: localhost
  run_once: true
  changed_when: false
  become: false

# --- Preflight : API reachable (évite les timeouts “random”) ---
- name: Preflight - wait for Kubernetes API to be reachable
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubeconfig_path }}"
      - get
      - --raw=/readyz
  register: api_readyz
  retries: 30
  delay: 2
  until: api_readyz.rc == 0
  changed_when: false
  delegate_to: localhost
  run_once: true

# --- Namespace (kubectl apply --validate=false pour éviter le fetch OpenAPI) ---
- name: Ensure namespace exists (kubectl apply)
  ansible.builtin.shell: |
    set -e
    cat <<'YAML' | kubectl --kubeconfig "{{ kubeconfig_path }}" apply --validate=false -f -
    apiVersion: v1
    kind: Namespace
    metadata:
      name: "{{ wazuh_namespace }}"
      labels:
        pod-security.kubernetes.io/warn: restricted
        pod-security.kubernetes.io/audit: restricted
    YAML
  args:
    executable: /bin/bash
  delegate_to: localhost
  run_once: true
  changed_when: false

# --- Secrets : deux chemins selon le backend de secrets ---
#
# kubernetes-secrets : génération + persistence disque (idempotent via fichier .pass)
# vault              : passwords déjà dans Vault (séminés par seed_from_k8s.yml Phase 2),
#                      K8s Secret wazuh-credentials géré par ESO → pas de création directe.

- name: Generate/Load indexer password (kubernetes-secrets backend)
  ansible.builtin.set_fact:
    wazuh_indexer_password: >-
      {{ lookup('password', secrets_dir ~ '/indexer.pass length=32 chars=ascii_letters,digits') }}
  delegate_to: localhost
  run_once: true
  no_log: true
  when: soc_vault_backend | default('kubernetes-secrets') == 'kubernetes-secrets'

- name: Generate/Load dashboard password (kubernetes-secrets backend)
  ansible.builtin.set_fact:
    wazuh_dashboard_password: >-
      {{ lookup('password', secrets_dir ~ '/dashboard.pass length=32 chars=ascii_letters,digits') }}
  delegate_to: localhost
  run_once: true
  no_log: true
  when: soc_vault_backend | default('kubernetes-secrets') == 'kubernetes-secrets'

# bcrypt cost=12 (chart: passwordHash en bcrypt 12 rounds)
- name: Compute bcrypt hashes (cost 12)
  ansible.builtin.set_fact:
    wazuh_indexer_password_hash: "{{ wazuh_indexer_password | password_hash('bcrypt', rounds=12) }}"
    wazuh_dashboard_password_hash: "{{ wazuh_dashboard_password | password_hash('bcrypt', rounds=12) }}"
  delegate_to: localhost
  run_once: true
  no_log: true
  when: soc_vault_backend | default('kubernetes-secrets') == 'kubernetes-secrets'

- name: Create/Update Wazuh credentials secret (kubernetes-secrets backend — ESO gère sinon)
  ansible.builtin.shell: |
    set -e
    cat <<'YAML' | kubectl --kubeconfig "{{ kubeconfig_path }}" -n "{{ wazuh_namespace }}" apply --validate=false -f -
    apiVersion: v1
    kind: Secret
    metadata:
      name: wazuh-credentials
      namespace: "{{ wazuh_namespace }}"
    type: Opaque
    stringData:
      indexer_password: "{{ wazuh_indexer_password }}"
      indexer_password_hash: "{{ wazuh_indexer_password_hash }}"
      dashboard_password: "{{ wazuh_dashboard_password }}"
      dashboard_password_hash: "{{ wazuh_dashboard_password_hash }}"
    YAML
  args:
    executable: /bin/bash
  delegate_to: localhost
  run_once: true
  changed_when: false
  no_log: true
  when: soc_vault_backend | default('kubernetes-secrets') == 'kubernetes-secrets'

# -----------------------------
# Helper: Wait workloads rollout (deploy/sts/ds) in namespace
# -----------------------------
- name: Wait workloads rollout (deploy/sts/ds) helper
  ansible.builtin.set_fact:
    _wazuh_rollout_helper: |
      set -euo pipefail
      NS="{{ wazuh_namespace }}"
      K="kubectl --kubeconfig {{ kubeconfig_path }} -n ${NS}"

      echo "==> Workloads in ${NS}:"
      ${K} get deploy,sts,ds -o wide || true

      wl="$(${K} get deploy,sts,ds -o name 2>/dev/null | tr '\n' ' ')"
      if [ -z "${wl}" ]; then
        echo "No Deployment/StatefulSet/DaemonSet found in namespace ${NS}."
        ${K} get all -o wide || true
        exit 1
      fi

      for w in ${wl}; do
        echo "==> rollout ${w}"
        ${K} rollout status "${w}" --timeout={{ wazuh_rollout_timeout | default('30m') }}
      done

      echo "==> Pod readiness snapshot:"
      ${K} get pods -o wide || true

      # Pods hors Running/Completed => KO
      bad_phase="$(${K} get pods --no-headers 2>/dev/null | awk '$3!="Running" && $3!="Completed"{print $1" "$2" "$3}')"
      if [ -n "${bad_phase}" ]; then
        echo "Pods not Running/Completed:"
        echo "${bad_phase}"
        exit 1
      fi

      # Running mais Ready X/Y avec X!=Y => KO
      not_ready="$(${K} get pods --no-headers 2>/dev/null | awk '$3=="Running"{split($2,a,"/"); if (a[1]!=a[2]) print $1" "$2" "$3}')"
      if [ -n "${not_ready}" ]; then
        echo "Running pods not Ready:"
        echo "${not_ready}"
        exit 1
      fi
  delegate_to: localhost
  run_once: true

# -----------------------------
# PHASE 1: Indexer uniquement
# -----------------------------
- name: Deploy Wazuh - Phase 1 (Indexer only)
  block:
    - name: Wait Helm release not pending (before Phase 1)
      ansible.builtin.shell: |
        set -e
        out="$({{ helm_binary_path }} -n {{ wazuh_namespace }} status {{ wazuh_release_name }} -o json 2>/dev/null || true)"
        if [ -z "$out" ]; then
          echo "not-installed"
          exit 0
        fi
        echo "$out" | grep -Eo '"status":"[^"]+"' | cut -d: -f2 | tr -d '"'
      args:
        executable: /bin/bash
      register: helm_release_status
      retries: 40
      delay: 15
      until: helm_release_status.stdout not in ["pending-install","pending-upgrade","pending-rollback"]
      changed_when: false
      delegate_to: localhost
      run_once: true

    - name: Helm upgrade/install (Phase 1) - Indexer only
      kubernetes.core.helm:
        name: "{{ wazuh_release_name }}"
        chart_ref: "{{ wazuh_chart_ref }}"
        chart_version: "{{ wazuh_chart_version }}"
        release_namespace: "{{ wazuh_namespace }}"
        create_namespace: false
        kubeconfig: "{{ kubeconfig_path }}"
        values_files:
          - "{{ role_path }}/files/values/indexer.values.yml"
        set_values:
          - value: "identifier.appName={{ wazuh_app_name }}"
          - value: "identifier.appId={{ wazuh_app_id }}"

          # ✅ Indexer ON
          - value: "indexer.enabled=true"
          - value: "indexer.deployment.enabled=true"

          # ✅ Manager OFF (sinon il crée master/worker + PVC)
          - value: "wazuh.enabled=true"              # laisse true si chart en dépend, mais on coupe master/worker
          - value: "wazuh.master.enabled=false"
          - value: "wazuh.worker.enabled=false"
          - value: "wazuh.worker.replicas=0"

          # ✅ Dashboard OFF
          - value: "dashboard.enabled=false"

          # Creds indexer
          - value: "indexer.cred.username=admin"
          - value: "indexer.cred.password={{ wazuh_indexer_password }}"
          - value: "indexer.cred.passwordHash={{ wazuh_indexer_password_hash }}"
        wait: false
        atomic: false
        timeout: "30m0s"
        update_repo_cache: true
        binary_path: "{{ helm_binary_path }}"
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: Snapshot - objects after Phase 1 install
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }} -n {{ wazuh_namespace }}
        get deploy,sts,ds,svc,pods,pvc -o wide
      changed_when: false
      delegate_to: localhost
      run_once: true

    - name: Wait for workloads rollout (Phase 1)
      ansible.builtin.shell: "{{ _wazuh_rollout_helper }}"
      args:
        executable: /bin/bash
      changed_when: false
      delegate_to: localhost
      run_once: true

  rescue:
    - name: Diagnostics Phase 1
      ansible.builtin.include_tasks: _rescue_diagnostics.yml
      vars:
        _wazuh_phase: "Phase 1 (Indexer)"
  always:
    - name: Snapshot - workloads after Phase 1
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }} -n {{ wazuh_namespace }}
        get deploy,sts,ds,svc,pods,pvc -o wide
      changed_when: false
      delegate_to: localhost
      run_once: true

# -----------------------------
# PHASE 2: Indexer + Manager
# -----------------------------
- name: Deploy Wazuh - Phase 2 (Enable Manager)
  block:
    - name: Helm upgrade/install (Phase 2) - Manager + Dashboard
      kubernetes.core.helm:
        name: "{{ wazuh_release_name }}"
        chart_ref: "{{ wazuh_chart_ref }}"
        chart_version: "{{ wazuh_chart_version }}"
        release_namespace: "{{ wazuh_namespace }}"
        kubeconfig: "{{ kubeconfig_path }}"
        values_files:
          - "{{ role_path }}/files/values/indexer.values.yml"
          - "{{ role_path }}/files/values/manager.values.yml"
          # - "{{ role_path }}/files/values/dashboard.values.yml"  # si tu en as un
        set_values:
          - value: "wazuh.master.enabled=true"
          - value: "wazuh.worker.enabled=true"
          - value: "dashboard.enabled=true"
        wait: true
        timeout: "30m0s"
        binary_path: "{{ helm_binary_path }}"
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: Snapshot - objects after Phase 2 upgrade
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }} -n {{ wazuh_namespace }}
        get deploy,sts,ds,svc,pods,pvc -o wide
      changed_when: false
      delegate_to: localhost
      run_once: true

    - name: Wait for workloads rollout (Phase 2)
      ansible.builtin.shell: "{{ _wazuh_rollout_helper }}"
      args:
        executable: /bin/bash
      changed_when: false
      delegate_to: localhost
      run_once: true

  rescue:
    - name: Diagnostics Phase 2
      ansible.builtin.include_tasks: _rescue_diagnostics.yml
      vars:
        _wazuh_phase: "Phase 2 (Manager)"
  always:
    - name: Snapshot - workloads after Phase 2
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }} -n {{ wazuh_namespace }}
        get deploy,sts,ds,svc,pods,pvc -o wide
      changed_when: false
      delegate_to: localhost
      run_once: true

# -----------------------------
# PHASE 3: Indexer + Manager + Dashboard
# -----------------------------
- name: Deploy Wazuh - Phase 3 (Enable Dashboard)
  block:
    - name: Helm upgrade (Phase 3) - enable Dashboard
      kubernetes.core.helm:
        name: "{{ wazuh_release_name }}"
        chart_ref: "{{ wazuh_chart_ref }}"
        chart_version: "{{ wazuh_chart_version }}"
        release_namespace: "{{ wazuh_namespace }}"
        create_namespace: false
        kubeconfig: "{{ kubeconfig_path }}"
        values_files:
          - "{{ role_path }}/files/values/indexer.values.yml"
          - "{{ role_path }}/files/values/manager.values.yml"
          - "{{ role_path }}/files/values/dashboard.values.yml"
        set_values:
          - value: "identifier.appName={{ wazuh_app_name }}"
          - value: "identifier.appId={{ wazuh_app_id }}"
          - value: "indexer.deployment.enabled=true"
          - value: "wazuh.deployment.enabled=true"
          - value: "dashboard.deployment.enabled=true"
          - value: "indexer.cred.password={{ wazuh_indexer_password }}"
          - value: "indexer.cred.passwordHash={{ wazuh_indexer_password_hash }}"
          - value: "dashboard.cred.password={{ wazuh_dashboard_password }}"
          - value: "dashboard.cred.passwordHash={{ wazuh_dashboard_password_hash }}"
        wait: false
        atomic: false
        timeout: "30m0s"
        binary_path: "{{ helm_binary_path }}"
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: Snapshot - objects after Phase 3 upgrade
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }} -n {{ wazuh_namespace }}
        get deploy,sts,ds,svc,pods,pvc -o wide
      changed_when: false
      delegate_to: localhost
      run_once: true

    - name: Wait for workloads rollout (Phase 3)
      ansible.builtin.shell: "{{ _wazuh_rollout_helper }}"
      args:
        executable: /bin/bash
      changed_when: false
      delegate_to: localhost
      run_once: true

  rescue:
    - name: Diagnostics Phase 3
      ansible.builtin.include_tasks: _rescue_diagnostics.yml
      vars:
        _wazuh_phase: "Phase 3 (Dashboard)"
  always:
    - name: Snapshot - workloads after Phase 3
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }} -n {{ wazuh_namespace }}
        get deploy,sts,ds,svc,pods,pvc -o wide
      changed_when: false
      delegate_to: localhost
      run_once: true


# --- Apply credentials for dashboard ---
- name: Get current wazuh-dashboard deployment
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    namespace: "{{ wazuh_namespace }}"
    api_version: apps/v1
    kind: Deployment
    name: wazuh-dashboard
  register: dash_dep
  delegate_to: localhost
  run_once: true
  vars:
    ansible_python_interpreter: /opt/ansible-k8s-venv/bin/python

- name: Build env list (dedupe by name) and set OPENSEARCH creds
  ansible.builtin.set_fact:
    dash_env_new: >-
      {{
        (
          (dash_dep.resources[0].spec.template.spec.containers[0].env | default([]))
          | rejectattr('name','equalto','OPENSEARCH_USERNAME')
          | rejectattr('name','equalto','OPENSEARCH_PASSWORD')
          | list
        )
        + [
          {'name':'OPENSEARCH_USERNAME','value':'admin'},
          {'name':'OPENSEARCH_PASSWORD','valueFrom':{'secretKeyRef':{'name':'wazuh-credentials','key':'indexer_password'}}}
        ]
      }}
  delegate_to: localhost
  run_once: true

- name: Apply env vars to wazuh-dashboard (idempotent)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    namespace: "{{ wazuh_namespace }}"
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: wazuh-dashboard
      spec:
        template:
          spec:
            containers:
              - name: wazuh-dashboard
                env: "{{ dash_env_new }}"
  delegate_to: localhost
  run_once: true
  vars:
    ansible_python_interpreter: /opt/ansible-k8s-venv/bin/python

- name: Restart wazuh-dashboard to pick env changes
  ansible.builtin.command: >
    kubectl --kubeconfig {{ kubeconfig_path }} -n {{ wazuh_namespace }}
    rollout restart deploy/wazuh-dashboard
  delegate_to: localhost
  run_once: true
  changed_when: true

- name: Wait wazuh-dashboard rollout
  ansible.builtin.command: >
    kubectl --kubeconfig {{ kubeconfig_path }} -n {{ wazuh_namespace }}
    rollout status deploy/wazuh-dashboard --timeout=5m
  delegate_to: localhost
  run_once: true
  changed_when: false

# --- Add template to dashboard ---
- name: Ensure wazuh-alerts template matches wazuh-alerts-* and archives
  ansible.builtin.shell: |
    set -euo pipefail
    NS="{{ wazuh_namespace }}"
    K="kubectl --kubeconfig {{ kubeconfig_path }} -n ${NS}"

    USER="$(${K} get secret indexer-cred -o jsonpath='{.data.INDEXER_USERNAME}' | base64 -d)"
    PASS="$(${K} get secret indexer-cred -o jsonpath='{.data.INDEXER_PASSWORD}' | base64 -d)"

    # Wait indexer API ready
    ${K} exec -i sts/wazuh-indexer -- sh -lc "apk add --no-cache curl >/dev/null 2>&1 || true; \
    i=0; \
    while true; do \
      if curl -sk -u '${USER}:${PASS}' https://localhost:9200 >/dev/null; then exit 0; fi; \
      i=\$((i+1)); \
      if [ \$i -ge 60 ]; then echo 'Indexer API not reachable'; exit 1; fi; \
      sleep 2; \
    done"

    # Check if template already contains wazuh-alerts-*
    has="$(${K} exec -i sts/wazuh-indexer -- sh -lc "apk add --no-cache curl >/dev/null 2>&1 || true; \
      curl -sk -u '${USER}:${PASS}' 'https://localhost:9200/_template/wazuh-alerts' | grep -c 'wazuh-alerts-\*' || true")"

    if [ "${has}" -ge 1 ]; then
      echo "Template already patched (wazuh-alerts-*)"
      exit 0
    fi

    echo "Patching wazuh-alerts template index_patterns..."
    ${K} exec -i sts/wazuh-manager-master -- sh -lc "
      set -e
      apk add --no-cache curl >/dev/null 2>&1 || true
      sed -e 's/\"wazuh-alerts-4.x-\\*\"/\"wazuh-alerts-4.x-*\",\"wazuh-alerts-*\"/g' \
          -e 's/\"wazuh-archives-4.x-\\*\"/\"wazuh-archives-4.x-*\",\"wazuh-archives-*\"/g' \
          /etc/filebeat/wazuh-template.json > /tmp/wazuh-template.patched.json

      curl -sk -u '${USER}:${PASS}' -H 'Content-Type: application/json' \
        -X PUT 'https://wazuh-indexer:9200/_template/wazuh-alerts' \
        --data-binary '@/tmp/wazuh-template.patched.json' >/dev/null
    "

    echo "Template patched."
  args:
    executable: /bin/bash
  no_log: true
  delegate_to: localhost
  run_once: true
  changed_when: true


- name: Ensure wazuh-alerts bootstrap index exists and replicas=0
  ansible.builtin.shell: |
    set -euo pipefail
    NS="{{ wazuh_namespace }}"
    K="kubectl --kubeconfig {{ kubeconfig_path }} -n ${NS}"

    USER="$(${K} get secret indexer-cred -o jsonpath='{.data.INDEXER_USERNAME}' | base64 -d)"
    PASS="$(${K} get secret indexer-cred -o jsonpath='{.data.INDEXER_PASSWORD}' | base64 -d)"

    exists="$(${K} exec -i sts/wazuh-indexer -- sh -lc "apk add --no-cache curl >/dev/null 2>&1 || true; \
      curl -sk -u '${USER}:${PASS}' -o /dev/null -w '%{http_code}' https://localhost:9200/wazuh-alerts-4.x-000001")"

    if [ "${exists}" = "200" ]; then
      echo "Index already exists"
    else
      echo "Creating bootstrap index wazuh-alerts-4.x-000001"
      ${K} exec -i sts/wazuh-indexer -- sh -lc "apk add --no-cache curl >/dev/null 2>&1 || true; \
        curl -sk -u '${USER}:${PASS}' -X PUT 'https://localhost:9200/wazuh-alerts-4.x-000001' \
          -H 'Content-Type: application/json' -d '{}' >/dev/null"
    fi

    echo "Forcing replicas=0"
    ${K} exec -i sts/wazuh-indexer -- sh -lc "apk add --no-cache curl >/dev/null 2>&1 || true; \
      curl -sk -u '${USER}:${PASS}' -X PUT 'https://localhost:9200/wazuh-alerts-4.x-000001/_settings' \
        -H 'Content-Type: application/json' -d '{\"index\":{\"number_of_replicas\":0}}' >/dev/null"

    ${K} exec -i sts/wazuh-indexer -- sh -lc "apk add --no-cache curl >/dev/null 2>&1 || true; \
      curl -sk -u '${USER}:${PASS}' 'https://localhost:9200/_cat/indices/wazuh-alerts*?v' || true"
  args:
    executable: /bin/bash
  no_log: true
  delegate_to: localhost
  run_once: true
  changed_when: true


# --- Post Helm: Certificate + Ingress (cert-manager) ---
- name: Create Certificate (kubectl apply)
  ansible.builtin.shell: |
    set -e
    cat <<'YAML' | kubectl --kubeconfig "{{ kubeconfig_path }}" -n "{{ wazuh_namespace }}" apply --validate=false -f -
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: wazuh-dashboard
      namespace: "{{ wazuh_namespace }}"
    spec:
      secretName: "{{ tls_secret_name }}"
      dnsNames:
        - "{{ wazuh_domain }}"
      issuerRef:
        name: "{{ cluster_issuer_name }}"
        kind: Issuer
    YAML
  args:
    executable: /bin/bash
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Apply Ingress for Wazuh Dashboard (TLS) (kubectl apply)
  ansible.builtin.shell: |
    set -e
    cat <<'YAML' | kubectl --kubeconfig "{{ kubeconfig_path }}" -n "{{ wazuh_namespace }}" apply --validate=false -f -
    {{ lookup('template', role_path ~ '/templates/ingress-dashboard.yml.j2') }}
    YAML
  args:
    executable: /bin/bash
  delegate_to: localhost
  run_once: true
  changed_when: false
  when: wazuh_ingress_managed_by | default('ansible') != 'gitops'

# --- Waits / Smoke gates ---
- name: Wait for Certificate Ready
  ansible.builtin.command: >
    kubectl --kubeconfig {{ kubeconfig_path }} -n {{ wazuh_namespace }}
    wait --for=condition=Ready certificate/wazuh-dashboard --timeout=10m
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Basic HTTPS check (expect 200/302/401)
  ansible.builtin.command: >
    curl -k -s -o /dev/null -w "%{http_code}\n" https://{{ wazuh_domain }}/
  register: wazuh_http_code
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Fail if dashboard not reachable via ingress
  ansible.builtin.fail:
    msg: "Wazuh dashboard not reachable on https://{{ wazuh_domain }}/ (code={{ wazuh_http_code.stdout | default('') }})"
  when: wazuh_http_code.stdout not in ["200", "302", "401"]
  delegate_to: localhost
  run_once: true
