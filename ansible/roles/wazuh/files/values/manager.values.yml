---
# Wazuh Manager
wazuh:
  master:
    storageSize: 10Gi
    storageClassName: longhorn

  worker:
    replicas: 0
    storageSize: 10Gi
    storageClassName: longhorn

  # Ne pas exposer publiquement
  service:
    type: ClusterIP
    masterType: ClusterIP
    workerType: ClusterIP

  images:
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

persistence:
  enabled: true
  storageClass: longhorn
  annotations:
    longhorn.io/numberOfReplicas: "1"
