---
# eso/tasks/external_secrets.yml — Création des ExternalSecret CRDs
# Un ExternalSecret par entrée dans eso_external_secrets (defaults/main.yml)

- name: ESO ExternalSecrets | S'assurer que les namespaces cibles existent
  kubernetes.core.k8s:
    kubeconfig: "{{ eso_kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ item }}"
  loop: "{{ eso_external_secrets | map(attribute='namespace') | unique | list }}"
  loop_control:
    label: "{{ item }}"

- name: ESO ExternalSecrets | Créer les ExternalSecret CRDs (template)
  kubernetes.core.k8s:
    kubeconfig: "{{ eso_kubeconfig_path }}"
    state: present
    template: external-secret.yml.j2
  loop: "{{ eso_external_secrets }}"
  loop_control:
    loop_var: es_item
    label: "{{ es_item.name }} → {{ es_item.namespace }}"

- name: ESO ExternalSecrets | Récapitulatif
  ansible.builtin.debug:
    msg: "{{ eso_external_secrets | length }} ExternalSecrets créés/mis à jour."
