---
# vault/tasks/configure_secrets.yml — KV v2 engine + policies Vault

# --- Root token ---
- name: Vault secrets | Résoudre le root token
  ansible.builtin.include_tasks: _resolve_vault_token.yml

# --- KV v2 engine ---
- name: Vault secrets | Activer le moteur KV v2 (mount={{ vault_kv_mount }})
  ansible.builtin.shell: >
    {{ _vault_exec }}
    vault secrets enable -path={{ vault_kv_mount }} -version=2 kv
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  register: _vault_kv_enable
  changed_when: >-
    _vault_kv_enable.rc == 0
    and 'already' not in _vault_kv_enable.stderr
  failed_when: >-
    _vault_kv_enable.rc != 0
    and 'already' not in _vault_kv_enable.stderr
    and 'path is already in use' not in _vault_kv_enable.stderr
  no_log: true

- name: Vault secrets | Configurer max-versions sur le KV engine
  ansible.builtin.shell: >
    {{ _vault_exec }}
    vault write {{ vault_kv_mount }}/config max_versions={{ vault_kv_max_versions }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  changed_when: true
  no_log: true

# --- Policies via fichiers temporaires ---
- name: Vault secrets | Écrire et appliquer la policy soc-readonly
  block:
    - name: Écrire la policy soc-readonly
      ansible.builtin.copy:
        content: "{{ lookup('template', 'policy-soc-readonly.hcl.j2') }}"
        dest: /tmp/vault-policy-readonly.hcl
        mode: "0600"

    - name: Copier dans le pod
      ansible.builtin.command: >
        kubectl cp /tmp/vault-policy-readonly.hcl
        {{ vault_namespace }}/vault-0:/tmp/policy-readonly.hcl
      environment:
        KUBECONFIG: "{{ vault_kubeconfig_path }}"
      changed_when: true

    - name: Appliquer la policy
      ansible.builtin.shell: >
        {{ _vault_exec }}
        vault policy write {{ vault_policy_readonly }} /tmp/policy-readonly.hcl
      environment:
        KUBECONFIG: "{{ vault_kubeconfig_path }}"
      changed_when: true
      no_log: true

    - name: Nettoyer le fichier temporaire
      ansible.builtin.file:
        path: /tmp/vault-policy-readonly.hcl
        state: absent

- name: Vault secrets | Écrire et appliquer la policy soc-admin
  block:
    - name: Écrire la policy soc-admin
      ansible.builtin.copy:
        content: "{{ lookup('template', 'policy-soc-admin.hcl.j2') }}"
        dest: /tmp/vault-policy-admin.hcl
        mode: "0600"

    - name: Copier dans le pod
      ansible.builtin.command: >
        kubectl cp /tmp/vault-policy-admin.hcl
        {{ vault_namespace }}/vault-0:/tmp/policy-admin.hcl
      environment:
