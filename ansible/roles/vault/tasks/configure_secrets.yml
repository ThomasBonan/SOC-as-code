    - name: Nettoyer le fichier temporaire
      ansible.builtin.file:
        path: /tmp/vault-policy-admin.hcl
        state: absent

- name: Vault secrets | Écrire et appliquer la policy soc-eso
  block:
    - name: Écrire la policy soc-eso
      ansible.builtin.copy:
        content: "{{ lookup('template', 'policy-soc-eso.hcl.j2') }}"
        dest: /tmp/vault-policy-eso.hcl
        mode: "0600"

    - name: Copier dans le pod
      ansible.builtin.command: >
        kubectl cp /tmp/vault-policy-eso.hcl
        {{ vault_namespace }}/vault-0:/tmp/policy-eso.hcl
      environment:
        KUBECONFIG: "{{ vault_kubeconfig_path }}"
      changed_when: true

    - name: Appliquer la policy
      ansible.builtin.shell: >
        {{ _vault_exec }}
        vault policy write {{ vault_policy_eso }} /tmp/policy-eso.hcl
      environment:
        KUBECONFIG: "{{ vault_kubeconfig_path }}"
      changed_when: true
      no_log: true

    - name: Nettoyer le fichier temporaire
      ansible.builtin.file:
        path: /tmp/vault-policy-eso.hcl
        state: absent

- name: Vault secrets | KV v2 et policies configurés
  ansible.builtin.debug:
    msg: >-
      Vault KV v2 actif sur '{{ vault_kv_mount }}/', policies
      {{ vault_policy_readonly }}, {{ vault_policy_admin }}, {{ vault_policy_eso }} créées.
