---
# vault/tasks/bootstrap_secrets.yml — Seed des secrets initiaux dans Vault
# Idempotent : n'écrase PAS un secret déjà présent dans Vault.

# --- Root token ---
- name: Vault bootstrap | Résoudre le root token
  ansible.builtin.include_tasks: _resolve_vault_token.yml

# --- Vérifier si les secrets de bootstrap existent déjà ---
- name: Vault bootstrap | Vérifier soc/bootstrap/thehive
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv get -format=json {{ vault_kv_mount }}/bootstrap/thehive
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  register: _vault_thehive_bootstrap_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Vault bootstrap | Vérifier soc/bootstrap/cortex
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv get -format=json {{ vault_kv_mount }}/bootstrap/cortex
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  register: _vault_cortex_bootstrap_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Vault bootstrap | Vérifier soc/bootstrap/shuffle
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv get -format=json {{ vault_kv_mount }}/bootstrap/shuffle
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  register: _vault_shuffle_bootstrap_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Vault bootstrap | Vérifier soc/bootstrap/grafana
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv get -format=json {{ vault_kv_mount }}/bootstrap/grafana
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  register: _vault_grafana_bootstrap_check
  changed_when: false
  failed_when: false
  no_log: true

# --- Générer des mots de passe forts (uniquement si absents) ---
- name: Vault bootstrap | Générer un mot de passe fort pour TheHive bootstrap
  ansible.builtin.set_fact:
    _vault_thehive_bootstrap_password: >-
      {{ lookup('community.general.random_string',
           length=vault_bootstrap_password_length,
           special=false) }}
  no_log: true
  when: _vault_thehive_bootstrap_check.rc != 0

- name: Vault bootstrap | Générer un mot de passe fort pour Cortex bootstrap
  ansible.builtin.set_fact:
    _vault_cortex_bootstrap_password: >-
      {{ lookup('community.general.random_string',
           length=vault_bootstrap_password_length,
           special=false) }}
  no_log: true
  when: _vault_cortex_bootstrap_check.rc != 0

- name: Vault bootstrap | Générer un mot de passe fort pour Shuffle bootstrap
  ansible.builtin.set_fact:
    _vault_shuffle_bootstrap_password: >-
      {{ lookup('community.general.random_string',
           length=vault_bootstrap_password_length,
           special=false) }}
  no_log: true
  when: _vault_shuffle_bootstrap_check.rc != 0

- name: Vault bootstrap | Générer un mot de passe fort pour Grafana admin
  ansible.builtin.set_fact:
    _vault_grafana_bootstrap_password: >-
      {{ lookup('community.general.random_string',
           length=vault_bootstrap_password_length,
           special=false) }}
  no_log: true
  when: _vault_grafana_bootstrap_check.rc != 0

# --- Stocker dans Vault (uniquement si absents) ---
- name: Vault bootstrap | Stocker les credentials TheHive bootstrap
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv put {{ vault_kv_mount }}/bootstrap/thehive
    login=admin@thehive.local
    password={{ _vault_thehive_bootstrap_password }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  changed_when: true
  no_log: true
  when: _vault_thehive_bootstrap_check.rc != 0

- name: Vault bootstrap | Stocker les credentials Cortex bootstrap
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv put {{ vault_kv_mount }}/bootstrap/cortex
    login=admin
    password={{ _vault_cortex_bootstrap_password }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  changed_when: true
  no_log: true
  when: _vault_cortex_bootstrap_check.rc != 0

- name: Vault bootstrap | Stocker les credentials Shuffle bootstrap
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv put {{ vault_kv_mount }}/bootstrap/shuffle
    username=admin
    password={{ _vault_shuffle_bootstrap_password }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  changed_when: true
  no_log: true
  when: _vault_shuffle_bootstrap_check.rc != 0

- name: Vault bootstrap | Stocker les credentials Grafana admin
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv put {{ vault_kv_mount }}/bootstrap/grafana
    username=admin
    password={{ _vault_grafana_bootstrap_password }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  changed_when: true
  no_log: true
  when: _vault_grafana_bootstrap_check.rc != 0

- name: Vault bootstrap | Vérifier soc/bootstrap/argocd
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv get -format=json {{ vault_kv_mount }}/bootstrap/argocd
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  register: _vault_argocd_bootstrap_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Vault bootstrap | Générer un mot de passe fort pour ArgoCD admin
  ansible.builtin.set_fact:
    _vault_argocd_bootstrap_password: >-
      {{ lookup('community.general.random_string',
           length=vault_bootstrap_password_length,
           special=false) }}
  no_log: true
  when: _vault_argocd_bootstrap_check.rc != 0

- name: Vault bootstrap | Stocker les credentials ArgoCD admin
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv put {{ vault_kv_mount }}/bootstrap/argocd
    username=admin
    password={{ _vault_argocd_bootstrap_password }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  changed_when: true
  no_log: true
  when: _vault_argocd_bootstrap_check.rc != 0

# --- Secrets base de données (jamais seedés depuis K8s sur fresh install vault backend) ---
- name: Vault bootstrap | Vérifier soc/databases/thehive-postgresql
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv get -format=json {{ vault_kv_mount }}/databases/thehive-postgresql
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  register: _vault_db_thehive_pg_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Vault bootstrap | Vérifier soc/databases/cortex-postgresql
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv get -format=json {{ vault_kv_mount }}/databases/cortex-postgresql
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  register: _vault_db_cortex_pg_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Vault bootstrap | Vérifier soc/databases/misp-mariadb
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv get -format=json {{ vault_kv_mount }}/databases/misp-mariadb
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  register: _vault_db_misp_mariadb_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Vault bootstrap | Vérifier soc/databases/misp-redis
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv get -format=json {{ vault_kv_mount }}/databases/misp-redis
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  register: _vault_db_misp_redis_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Vault bootstrap | Générer passwords DB absents
  ansible.builtin.set_fact:
    _vault_db_thehive_pg_pass: >-
      {{ lookup('community.general.random_string', length=vault_bootstrap_password_length, special=false) }}
    _vault_db_cortex_pg_pass: >-
      {{ lookup('community.general.random_string', length=vault_bootstrap_password_length, special=false) }}
    _vault_db_misp_mariadb_root: >-
      {{ lookup('community.general.random_string', length=vault_bootstrap_password_length, special=false) }}
    _vault_db_misp_mariadb_pass: >-
      {{ lookup('community.general.random_string', length=vault_bootstrap_password_length, special=false) }}
    _vault_db_misp_redis_pass: >-
      {{ lookup('community.general.random_string', length=vault_bootstrap_password_length, special=false) }}
  no_log: true

- name: Vault bootstrap | Stocker credentials TheHive PostgreSQL
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv put {{ vault_kv_mount }}/databases/thehive-postgresql
    postgres-password={{ _vault_db_thehive_pg_pass }}
    password={{ _vault_db_thehive_pg_pass }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  changed_when: true
  no_log: true
  when: _vault_db_thehive_pg_check.rc != 0

- name: Vault bootstrap | Stocker credentials Cortex PostgreSQL
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv put {{ vault_kv_mount }}/databases/cortex-postgresql
    postgres-password={{ _vault_db_cortex_pg_pass }}
    password={{ _vault_db_cortex_pg_pass }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  changed_when: true
  no_log: true
  when: _vault_db_cortex_pg_check.rc != 0

- name: Vault bootstrap | Stocker credentials MISP MariaDB
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv put {{ vault_kv_mount }}/databases/misp-mariadb
    mariadb-root-password={{ _vault_db_misp_mariadb_root }}
    mariadb-password={{ _vault_db_misp_mariadb_pass }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  changed_when: true
  no_log: true
  when: _vault_db_misp_mariadb_check.rc != 0

- name: Vault bootstrap | Stocker credentials MISP Redis
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv put {{ vault_kv_mount }}/databases/misp-redis
    redis-password={{ _vault_db_misp_redis_pass }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  changed_when: true
  no_log: true
  when: _vault_db_misp_redis_check.rc != 0

# --- Wazuh credentials (indexer + dashboard) ---
- name: Vault bootstrap | Vérifier credentials/wazuh-credentials
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv get -format=json {{ vault_kv_mount }}/credentials/wazuh-credentials
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  register: _vault_wazuh_creds_check
  changed_when: false
  failed_when: false
  no_log: true

- name: Vault bootstrap | Générer passwords Wazuh (indexer + dashboard)
  ansible.builtin.set_fact:
    _vault_wazuh_indexer_pass: >-
      {{ lookup('community.general.random_string', length=vault_bootstrap_password_length, special=false) }}
    _vault_wazuh_dashboard_pass: >-
      {{ lookup('community.general.random_string', length=vault_bootstrap_password_length, special=false) }}
  no_log: true
  when: _vault_wazuh_creds_check.rc != 0

- name: Vault bootstrap | Stocker passwords Wazuh (plain — hashes calculés par le rôle wazuh)
  ansible.builtin.shell: >
    {{ _vault_exec }} vault kv put {{ vault_kv_mount }}/credentials/wazuh-credentials
    indexer_password={{ _vault_wazuh_indexer_pass }}
    dashboard_password={{ _vault_wazuh_dashboard_pass }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"
  changed_when: true
  no_log: true
  when: _vault_wazuh_creds_check.rc != 0

- name: Vault bootstrap | Rapport de seed
  ansible.builtin.debug:
    msg: >-
      Bootstrap passwords :
      TheHive={{ 'CRÉÉ' if _vault_thehive_bootstrap_check.rc != 0 else 'EXISTANT' }},
      Cortex={{ 'CRÉÉ' if _vault_cortex_bootstrap_check.rc != 0 else 'EXISTANT' }},
      Shuffle={{ 'CRÉÉ' if _vault_shuffle_bootstrap_check.rc != 0 else 'EXISTANT' }},
      Grafana={{ 'CRÉÉ' if _vault_grafana_bootstrap_check.rc != 0 else 'EXISTANT' }},
      ArgoCD={{ 'CRÉÉ' if _vault_argocd_bootstrap_check.rc != 0 else 'EXISTANT' }},
      Wazuh={{ 'CRÉÉ' if _vault_wazuh_creds_check.rc != 0 else 'EXISTANT' }}.
