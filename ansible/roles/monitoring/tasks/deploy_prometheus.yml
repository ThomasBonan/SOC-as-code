---
# monitoring/tasks/deploy_prometheus.yml — Déploiement kube-prometheus-stack

- name: Monitoring | Prometheus — déployer kube-prometheus-stack via Helm
  kubernetes.core.helm:
    kubeconfig: "{{ monitoring_kubeconfig_path }}"
    name: kube-prometheus-stack
    chart_ref: prometheus-community/kube-prometheus-stack
    chart_version: "{{ monitoring_prometheus_chart_version }}"
    release_namespace: "{{ monitoring_namespace }}"
    create_namespace: false
    wait: true
    timeout: "15m"
    values: "{{ lookup('template', 'prometheus-values.yml.j2') | from_yaml }}"

# GF_SECURITY_ADMIN_PASSWORD n'est appliqué qu'à la première initialisation de grafana.db.
# On force la synchronisation via la CLI Grafana après chaque déploiement.
- name: Monitoring | Grafana — récupérer le nom du pod Grafana
  kubernetes.core.k8s_info:
    kubeconfig: "{{ monitoring_kubeconfig_path }}"
    kind: Pod
    namespace: "{{ monitoring_namespace }}"
    label_selectors:
      - app.kubernetes.io/name=grafana
  register: _grafana_pods
  retries: 10
  delay: 15
  until: (_grafana_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length) >= 1

- name: Monitoring | Grafana — synchroniser le mot de passe admin avec la DB
  ansible.builtin.shell: >
    kubectl exec -n {{ monitoring_namespace }}
    {{ _grafana_pods.resources | selectattr('status.phase', 'equalto', 'Running') | map(attribute='metadata.name') | first }}
    -c grafana --
    grafana cli admin reset-admin-password {{ monitoring_grafana_admin_password }}
  environment:
    KUBECONFIG: "{{ monitoring_kubeconfig_path }}"
  no_log: true
  changed_when: true

- name: Monitoring | Prometheus — attendre que les pods soient Running
  kubernetes.core.k8s_info:
    kubeconfig: "{{ monitoring_kubeconfig_path }}"
    api_version: v1
    kind: Pod
    namespace: "{{ monitoring_namespace }}"
    label_selectors:
      - app.kubernetes.io/name=prometheus
  register: _prom_pods
  retries: 20
  delay: 15
  until: >
    (_prom_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length) >= 1

- name: Monitoring | Prometheus — créer l'Ingress Grafana
  kubernetes.core.k8s:
    kubeconfig: "{{ monitoring_kubeconfig_path }}"
    state: present
    template: ingress-grafana.yml.j2
