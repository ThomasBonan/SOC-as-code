---
# monitoring/tasks/preflight.yml — Vérification des prérequis

- name: Monitoring | Preflight — vérifier que cert-manager est opérationnel
  kubernetes.core.k8s_info:
    kubeconfig: "{{ monitoring_kubeconfig_path }}"
    api_version: v1
    kind: Pod
    namespace: "{{ cert_manager_namespace }}"
    label_selectors:
      - app.kubernetes.io/name=cert-manager
  register: _cm_pods
  failed_when: (_cm_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length) == 0
  when: cert_manager_managed_by | default('ansible') != 'gitops'

- name: Monitoring | Preflight — vérifier que Longhorn est opérationnel
  kubernetes.core.k8s_info:
    kubeconfig: "{{ monitoring_kubeconfig_path }}"
    api_version: v1
    kind: Pod
    namespace: "{{ longhorn_namespace }}"
    label_selectors:
      - app=longhorn-manager
  register: _lh_pods
  failed_when: (_lh_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length) == 0
  when: longhorn_managed_by | default('ansible') != 'gitops'

- name: Monitoring | Preflight — ajouter les repos Helm
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.url }}"
  loop:
    - name: prometheus-community
      url: https://prometheus-community.github.io/helm-charts
    - name: grafana
      url: https://grafana.github.io/helm-charts

- name: Monitoring | Preflight — créer le namespace soc-monitoring
  kubernetes.core.k8s:
    kubeconfig: "{{ monitoring_kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ monitoring_namespace }}"
        labels:
          kubernetes.io/metadata.name: "{{ monitoring_namespace }}"
          app.kubernetes.io/managed-by: ansible
          # PSS warn mode — signale les violations sans bloquer (enforce serait trop risqué en lab)
          pod-security.kubernetes.io/warn: restricted
          pod-security.kubernetes.io/audit: restricted

- name: Monitoring | Preflight — valider que le mot de passe Grafana est résolu
  ansible.builtin.assert:
    that: monitoring_grafana_admin_password | length > 0
    fail_msg: >-
      monitoring_grafana_admin_password est vide.
      Assurez-vous que Vault est unsealed et que soc_vault_backend == 'vault'
      (ou passez le mot de passe via -e monitoring_grafana_admin_password=...).
