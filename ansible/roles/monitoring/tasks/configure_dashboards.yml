---
# monitoring/tasks/configure_dashboards.yml — Import dashboards Grafana via ConfigMaps
# Note: les clés de dict YAML dans `definition:` ne sont pas évaluées par Jinja2,
# on passe donc par include_tasks avec set_fact pour précalculer le nom de fichier.

- name: Monitoring | Dashboards — import tous les dashboards
  ansible.builtin.include_tasks: _create_dashboard_configmap.yml
  loop:
    - "{{ role_path }}/files/dashboards/infra-kubernetes.json"
    - "{{ role_path }}/files/dashboards/infra-databases.json"
    - "{{ role_path }}/files/dashboards/infra-network.json"
    - "{{ role_path }}/files/dashboards/ssi-overview.json"
    - "{{ role_path }}/files/dashboards/ssi-alerts.json"
    - "{{ role_path }}/files/dashboards/ssi-cases.json"
    - "{{ role_path }}/files/dashboards/ssi-risk.json"
    - "{{ role_path }}/files/dashboards/ssi-pipeline.json"
  loop_control:
    loop_var: _dashboard_path
