---
# --- Versions & cluster ---
cluster_name: soc-k8s
kubernetes_version: "v1.30.4"        # version pinning kubeadm/kubelet/kubectl
cri: containerd
kubelet_cgroup_driver: systemd
kubeadm_api_version: "kubeadm.k8s.io/v1beta3"
helm_binary_path: /usr/local/bin/helm
kubeconfig_path: /home/mgmt-user/SOC-as-code/ansible/playbooks/artifacts/admin.conf

# --- Réseaux Kubernetes ---
pod_cidr: "10.244.0.0/16"            # Calico par défaut
service_cidr: "10.96.0.0/12"

# --- Containerd (socket kubeadm) ---
cri_socket: "unix:///run/containerd/containerd.sock"

# --- CNI (choix) ---
cni: cilium

# Cilium - MVP
cilium_version: "1.15.6"         # par ex.
cilium_kubeproxy_replacement: "false"     # Cilium 1.15: "disabled" → "false" (kube-proxy retained)
cilium_routing_mode: "tunnel"    # simple (VXLAN). Plus tard: "native"
cilium_hubble_enabled: true
cilium_hubble_ui: true
cilium_prometheus_enabled: true   # métriques agent + operator

# --- DNS du cluster ---
cluster_dns: "10.96.0.10"            # IP kube-dns dans le service CIDR
cluster_domain: "cluster.local"

# ── GitOps managed_by — "gitops" = ArgoCD gère le Helm, Ansible skippe ──────
# Mettre "ansible" pour revenir au déploiement Ansible classique.
#
# Mot de passe de bootstrap ArgoCD : utilisé lors du premier déploiement quand
# Vault n'est pas encore disponible (ArgoCD doit démarrer avant Vault pour que
# Longhorn soit disponible). Remplacé par le mot de passe Vault via
# 'make argocd-update-password' une fois Vault déployé.
argocd_admin_password_bootstrap: "Admin@ArgoCD-Bootstrap2024!"

metallb_managed_by: "gitops"
ingress_nginx_managed_by: "gitops"
cert_manager_managed_by: "gitops"
longhorn_managed_by: "gitops"
cortex_managed_by: "gitops"
thehive_managed_by: "gitops"
misp_redis_managed_by: "gitops"
shuffle_managed_by: "gitops"

# MetalLB
metallb_namespace: metallb-system
metallb_version: "0.14.9"          # exemple stable
metallb_pool_name: default-pool
metallb_ip_range: "10.0.30.50-10.0.30.80"   # adapte à TON réseau L2

# BGP
metallb_my_asn: 65010          # ASN MetalLB (speakers)
metallb_router_asn: 65000      # ASN OPNsense/FRR
metallb_router_ip: "10.0.20.254"

# Optionnel (souvent utile)
metallb_bgp_peer_name: "opnsense"
metallb_bgp_adv_name: "bgp-adv"
metallb_peer_port: 179
metallb_hold_time: "180s"
metallb_keepalive_time: "60s"
metallb_communities: []        # ex: ["65000:100"]

# Ingress NGINX
ingress_nginx_namespace: ingress-nginx
ingress_nginx_chart_version: "4.11.3"       # exemple stable

# --- Bastion (pour copier le kubeconfig si tu veux) ---
bastion_copy_kubeconfig: true
bastion_user: "mgmt-user"
bastion_host: "10.0.10.10"           # mgmt-soc

# --- cert-manager ---
cert_manager_namespace: cert-manager
cert_manager_version: "v1.14.7"          # adapte si tu pins ailleurs
cert_manager_install_crds: true

# PKI interne
pki_dir: "/etc/pki/soc-lab"
soc_lab_ca_name: "soc-lab-ca"
soc_lab_ca_common_name: "SOC Lab Internal CA"
soc_lab_ca_days: 3650

# Issuer
cert_manager_clusterissuer_name: "soc-lab-ca-issuer"

# Domaine apps
apps_domain: "apps.soc.lab"
ingress_class: "nginx"

# --- Longhorn (storage CNI) ---
longhorn_namespace: longhorn-system
longhorn_chart_version: "1.11.1"
longhorn_release: longhorn
longhorn_set_default_sc: true

misp_admin_email: "admin@soc.lab"

k8s_ansible_python: "/opt/ansible-k8s-venv/bin/python"

# Namespaces
soc_namespaces:
  wazuh: soc-wazuh
  thehive: soc-thehive
  cortex: soc-cortex
  misp: soc-core
  monitoring: soc-monitoring
  shuffle: soc-shuffle
  argocd: argocd

# ============================================================
# ArgoCD — variables globales (rôle argocd)
# ============================================================
argocd_namespace: "argocd"
argocd_ingress_host: "argocd.{{ apps_domain }}"
argocd_repo_url: "https://github.com/ThomasBonan/SOC-as-code.git"
argocd_repo_target_revision: "main"

# repo-server OOM avec 256Mi quand ~10 Helm charts synced simultanément
argocd_repo_server_resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Services
soc_services:
  thehive: thehive
  cortex: cortex
  misp: misp

# Ports (Service ports)
soc_ports:
  thehive: 9000
  cortex: 9001
  misp: 443

# SPIRE namespace (injecté par le chart Cilium lors du playbook 155-soc-mtls)
cilium_spire_namespace: cilium-spire

# Protocoles internes (prod-like: https si tu gères un CA interne, sinon http)
soc_protocols:
  thehive: http    # Plain HTTP at service level; TLS terminated at Nginx Ingress
  cortex: http     # Plain HTTP at service level; TLS terminated at Nginx Ingress
  misp: https      # MISP container natively serves TLS on port 443

# Endpoints (SoT)
soc_endpoints:
  thehive:
    host: "{{ soc_services.thehive }}.{{ soc_namespaces.thehive }}.svc"
    url: "{{ soc_protocols.thehive }}://{{ soc_endpoints.thehive.host }}:{{ soc_ports.thehive }}"
    api_base: "{{ soc_endpoints.thehive.url }}/api"
  cortex:
    host: "{{ soc_services.cortex }}.{{ soc_namespaces.cortex }}.svc"
    url: "{{ soc_protocols.cortex }}://{{ soc_endpoints.cortex.host }}:{{ soc_ports.cortex }}"
    api_base: "{{ soc_endpoints.cortex.url }}/api"
  misp:
    host: "{{ soc_services.misp }}.{{ soc_namespaces.misp }}.svc"
    url: "{{ soc_protocols.misp }}://{{ soc_endpoints.misp.host }}:{{ soc_ports.misp }}"
    api_base: "{{ soc_endpoints.misp.url }}/"

soc_http:
  timeout: 10
  retries: 20
  delay: 3

# ============================================================
# SOC Foundations - variables globales (rôle soc_foundations)
# ============================================================

# Environnement courant — valeurs valides : dev | staging | prod
# IMPACT SÉCURITÉ : cette variable contrôle plusieurs comportements critiques :
#   - prod  : soc_validate_tls doit être true, réseau strict, pas de debug
#   - staging : tests d'intégration, TLS optionnel
#   - dev   : lab local, TLS désactivé, restrictions relâchées
# Peut être surchargé via la variable d'env SOC_ENV dans le pipeline CI/CD
soc_environment: "dev"

# Validation TLS pour les appels HTTP Ansible (uri, get_url, etc.)
# IMPORTANT : passer à true en production pour valider les certificats TLS.
# En dev/staging : false est acceptable si un CA interne auto-signé est utilisé.
soc_validate_tls: false

# Backend de secrets actuel (pour traçabilité et migration future)
# Valeurs : kubernetes-secrets | vault | eso (External Secrets Operator)
soc_vault_backend: "vault"

# ============================================================
# HashiCorp Vault — variables globales (rôle vault + eso)
# ============================================================
soc_vault_namespace: "soc-vault"
soc_vault_addr: "https://vault.soc-vault.svc:8200"
soc_vault_kv_mount: "soc"
# Chemin vers le CA cert de soc-lab-ca-issuer (déployé par cert-manager)
vault_ca_cert: "/etc/pki/soc-lab/soc-lab-ca.crt"

# CIDRs autorisés à accéder aux APIs SOC (TheHive:9000, Cortex:9001, MISP:443, Wazuh:55000)
# Appliqués via NetworkPolicy Kubernetes (ingress ipBlock) par le rôle soc_foundations.
# En production, restreindre aux seuls CIDR des runners CI/CD et du controller Ansible.
soc_allowed_api_sources:
  - "10.0.0.0/8"       # Réseau interne lab (adapter au CIDR de gestion réel)
  - "172.16.0.0/12"    # RFC1918 lab — à restreindre en production
  # - "192.168.0.0/16"  # Décommenter si nécessaire

# Comptes de service créés par soc_foundations (un par plateforme SOC)
# Principe du moindre privilège : rôles/profils non-admin, API-only, non-interactifs
soc_service_accounts:
  thehive:
    login: "svc-foundations@thehive.local"
    name: "SOC Foundations Service Account"
    profile: "analyst"      # Non-admin, accès lecture/écriture d'alertes
    organisation: "SOC"     # Même org que svc-selftest et Cortex SA
  cortex:
    login: "svc-foundations"
    name: "SOC Foundations Service Account"
    organisation: "SOC"
    role: "read"            # Lecture seule des résultats d'analyse
  misp:
    email: "svc-foundations@soc.lab"
    org_id: 1
    role_id: 3              # Sync User = partage de threat intel, pas d'admin
  wazuh:
    username: "svc-foundations"
    role_id: 1              # wazuh-readonly built-in role (id=1)

# ============================================================
# SOC Risk Engine — surcharges site-specific (rôle soc_risk_engine)
# Les valeurs par défaut (poids, seuils, asset_weights) sont dans
# roles/soc_risk_engine/defaults/main.yml
# ============================================================

# ============================================================
# SOC Compliance — variables globales (rôle soc_compliance)
# Playbook 200 | Drift detection & compliance validation.
# Surchargeable via -e ou envs/prod.yml (SOC_ENV=prod).
# ============================================================

# Mode d'exécution du scan de conformité.
#   audit   : lecture seule, détecte et rapporte les dérives (défaut)
#   enforce : (futur) ré-applique les configurations en dérive
soc_compliance_mode: "audit"

# Arrêter le playbook (exit code 1) si une dérive est détectée.
# Utile en CI/CD pour bloquer un pipeline sur non-conformité.
# Passer à false pour downgrader en simple avertissement.
soc_compliance_fail_on_drift: true

# Générer un fichier JSON exploitable par le pipeline CI/CD.
# Chemin : ansible/playbooks/artifacts/soc-compliance-report.json
soc_compliance_generate_artifact: true

# ============================================================
# Monitoring — surcharges site-specific (rôle monitoring)
# Les valeurs par défaut sont dans roles/monitoring/defaults/main.yml
# ============================================================

# Grafana FQDN dépend du domaine apps — override explicite
monitoring_grafana_ingress_host: "grafana.{{ apps_domain }}"

# ════════════════════════════════════════════════════════════════════════════════
# SOC Self-Test (210) — Continuous E2E pipeline validation
# ════════════════════════════════════════════════════════════════════════════════
#
# Playbook 210 injects a synthetic alert with a dedicated test IOC and validates
# its propagation through the full SOC pipeline (TheHive→Cortex→RiskEngine→MISP).
# Complements 200-soc-compliance (static config audit) with runtime behavior tests.
#
# Test IOC: 203.0.113.250 (RFC 5737 TEST-NET-3 — never routable, safe for lab use)

# Active Response safe mode: evaluates conditions but never executes real AR.
# Set to false only when explicitly validating actual Wazuh firewall-drop execution.
soc_selftest_safe_mode: true

# Fail the Ansible run (exit code 1) if global_status != healthy.
# Useful as a CI/CD deployment gate.
soc_selftest_fail_on_error: true

# Delete all test artifacts (alert, case, MISP event) after verification.
# Set to false for post-mortem investigation if the selftest fails.
soc_selftest_cleanup: true

# inject_via_wazuh=true  : full E2E via kubectl exec logger on Wazuh manager (default).
#   Wazuh → Shuffle webhook → TheHive → Cortex → Risk Engine. Requires rule 999999.
# inject_via_wazuh=false : inject directly via TheHive API. Shuffle is NOT triggered.
#   Only inject+verify_thehive phases are meaningful; other verify_* will fail.
soc_selftest_inject_via_wazuh:  true
soc_selftest_injection_rule_id: 999999

# Timeouts tuned to Shuffle (event-driven, synchronous within workflow):
#   Shuffle alert-triage workflow handles TheHive promotion + Cortex + risk scoring.
#   No CronJob involved since 185.
soc_selftest_timeout_seconds:            90    # verify_thehive (Wazuh→Shuffle→TheHive latency)
soc_selftest_automation_timeout_seconds: 120   # verify_cortex  (Shuffle triggers Cortex synchronously)
soc_selftest_risk_timeout_seconds:       120   # verify_risk    (Shuffle calls risk engine via HTTP POST)
soc_selftest_poll_interval:              5     # seconds between polling retries
