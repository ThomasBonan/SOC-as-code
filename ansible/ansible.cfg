[defaults]
inventory = inventories/k8s.ini
roles_path = ./roles:/home/runner/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles
host_key_checking = False
retry_files_enabled = False
forks = 20
timeout = 30
interpreter_python = auto_silent
result_format=yaml
callback_enabled = profile_tasks

[ssh_connection]
pipelining = True
ssh_args = -o StrictHostKeyChecking=no