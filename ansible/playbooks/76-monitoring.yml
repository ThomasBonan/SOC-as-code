---
# 76-monitoring.yml — Déploiement de la stack de supervision
#
# Prérequis :
#   - 60-post-config-master.yml (cert-manager + Longhorn)
#   - 75-vault.yml (optionnel — si soc_vault_backend == vault)
#
# Déploie :
#   - Prometheus + Grafana + Alertmanager (kube-prometheus-stack)
#   - Loki + Promtail (agrégation logs)
#   - Blackbox Exporter (probes HTTP SOC)
#   - Datasources Grafana (Loki, Wazuh OpenSearch)
#   - Dashboards SSI (4 dashboards : infra-kubernetes, ssi-alerts, ssi-cases, ssi-overview)
#   - PrometheusRules (alertes infra + services SOC)
#
# Usage :
#   ansible-playbook playbooks/76-monitoring.yml
#   ansible-playbook playbooks/76-monitoring.yml --tags deploy
#   ansible-playbook playbooks/76-monitoring.yml --tags dashboards

- name: Déploiement supervision — Prometheus + Grafana + Loki
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ansible_python_interpreter: "{{ k8s_ansible_python }}"
  pre_tasks:
    - name: Monitoring | Résoudre le mot de passe Grafana depuis Vault
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../roles/vault/tasks/fetch_bootstrap_vars.yml"
        apply:
          tags: always
      when: soc_vault_backend | default('kubernetes-secrets') != 'kubernetes-secrets'
      tags: always

    - name: Monitoring | Appliquer le mot de passe Grafana résolu
      ansible.builtin.set_fact:
        monitoring_grafana_admin_password: "{{ grafana_admin_password }}"
      when:
        - soc_vault_backend | default('kubernetes-secrets') != 'kubernetes-secrets'
        - grafana_admin_password is defined
      no_log: true
      tags: always

    - name: Monitoring | Appliquer le mot de passe OpenSearch Wazuh résolu
      ansible.builtin.set_fact:
        monitoring_wazuh_opensearch_password: "{{ wazuh_dashboard_password }}"
      when:
        - soc_vault_backend | default('kubernetes-secrets') != 'kubernetes-secrets'
        - wazuh_dashboard_password is defined
      no_log: true
      tags: always
  roles:
    - role: monitoring
      tags: [monitoring]
