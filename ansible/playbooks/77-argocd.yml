---
# 77-argocd.yml — Déploiement ArgoCD GitOps Controller
#
# Prérequis :
#   - 60-post-config-master.yml (cert-manager, ingress-nginx, Longhorn)
#   - 75-vault.yml --tags bootstrap  (seed soc/bootstrap/argocd dans Vault)
#   - 75-vault.yml --tags external_secrets  (crée ExternalSecret argocd-admin-creds)
#
# Usage :
#   ansible-playbook ansible/playbooks/77-argocd.yml
#   ansible-playbook ansible/playbooks/77-argocd.yml --tags preflight
#   ansible-playbook ansible/playbooks/77-argocd.yml --tags deploy
#   ansible-playbook ansible/playbooks/77-argocd.yml --tags configure
#
# Tags disponibles : preflight, deploy, configure, argocd

- name: "77 | ArgoCD — GitOps Controller"
  hosts: localhost
  gather_facts: false
  vars:
    ansible_python_interpreter: "{{ k8s_ansible_python }}"

  pre_tasks:
    - name: Override soc_environment depuis SOC_ENV
      ansible.builtin.set_fact:
        soc_environment: "{{ lookup('env', 'SOC_ENV') }}"
      when: lookup('env', 'SOC_ENV') | length > 0
      tags: always

    - name: ArgoCD | Charger les bootstrap passwords depuis Vault
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../roles/vault/tasks/fetch_bootstrap_vars.yml"
        apply:
          tags: always
      when: soc_vault_backend | default('kubernetes-secrets') != 'kubernetes-secrets'
      tags: always

  roles:
    - role: argocd
      tags:
        - argocd
