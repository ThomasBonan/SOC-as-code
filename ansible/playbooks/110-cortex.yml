---
# Phase C : Helm géré par ArgoCD (infra-cortex) quand cortex_managed_by=gitops.
# La configuration API post-install (130-soc-config.yml) reste dans Ansible.
- name: Deploy Cortex
  hosts: localhost
  connection: local
  vars:
    ansible_python_interpreter: /opt/ansible-k8s-venv/bin/python
  gather_facts: false
  tasks:
    - name: Attendre infra-cortex (ArgoCD) Synced+Healthy
      ansible.builtin.command: >
        kubectl --kubeconfig={{ kubeconfig_path }}
        -n argocd get application infra-cortex
        -o jsonpath='{.status.health.status}/{.status.sync.status}'
      register: _cortex_status
      until: _cortex_status.stdout == 'Healthy/Synced'
      retries: 60
      delay: 10
      changed_when: false
      when: cortex_managed_by | default('ansible') == 'gitops'

    - name: Déployer Cortex via Helm (si non géré par GitOps)
      ansible.builtin.include_role:
        name: cortex
      when: cortex_managed_by | default('ansible') != 'gitops'
