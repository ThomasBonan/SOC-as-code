---
# infra-ingress-nginx.yml — Ingress NGINX Controller (Helm)
# Phase B GitOps — migré depuis le rôle Ansible ingress_nginx
# Dépend de MetalLB (wave 0) pour l'attribution de l'IP LoadBalancer.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-ingress-nginx
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: argocd
    soc.lab/layer: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          ingressClassResource:
            default: true
          service:
            type: LoadBalancer
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Service
      name: ingress-nginx-controller
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs
