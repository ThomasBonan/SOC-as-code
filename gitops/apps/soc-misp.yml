# soc-misp.yml — Application ArgoCD MISP
# Phase 5 GitOps — ConfigMap misp-config + Ingress misp.apps.soc.lab
# Helm Redis, Deployments, Secrets et bootstrap restent Ansible (Day 1)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: soc-misp
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: argocd
    soc.lab/layer: application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ThomasBonan/SOC-as-code.git
    targetRevision: main
    path: gitops/environments/lab/misp
  destination:
    server: https://kubernetes.default.svc
    namespace: soc-core
  syncPolicy:
    automated:
      prune: false      # Sécurité : pas de suppression automatique tant que la migration n'est pas complète
      selfHeal: true    # Réconciliation automatique si drift détecté
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false   # soc-core doit déjà exister (créé par Ansible Day 1)
      - RespectIgnoreDifferences=true
