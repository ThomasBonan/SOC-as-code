# soc-risk-engine.yml — Application ArgoCD Risk Engine SOC
# Phase 4 GitOps — Deployment, Service, Ingress, ConfigMaps
# Les custom fields TheHive et le bootstrap Ansible restent en Day 1
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: soc-risk-engine
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: argocd
    soc.lab/layer: application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ThomasBonan/SOC-as-code.git
    targetRevision: main
    path: gitops/environments/lab/risk-engine
  destination:
    server: https://kubernetes.default.svc
    namespace: soc-thehive
  syncPolicy:
    automated:
      prune: false      # Sécurité : pas de suppression automatique tant que la migration n'est pas complète
      selfHeal: true    # Réconciliation automatique si drift détecté
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false   # soc-thehive doit déjà exister (créé par Ansible Day 1)
      - RespectIgnoreDifferences=true
  # Champs injectés automatiquement par kubectl — ignorer pour éviter les faux drifts
  # kubectl rollout restart ajoute cette annotation sur le pod template
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: risk-engine
      jsonPointers:
        - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
