# soc-security.yml — ApplicationSet pour la couche sécurité
# Gère : Vault (configuration uniquement)
# Note : ESO ExternalSecrets gérés par l'Application dédiée soc-eso-externalsecrets (gitops/apps/soc-eso.yml)
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: soc-security
  namespace: argocd
  labels:
    soc.lab/component: argocd
    soc.lab/managed-by: gitops
spec:
  generators:
    - list:
        elements:
          - name: vault-config
            namespace: soc-vault
            path: gitops/environments/lab/vault
  template:
    metadata:
      name: 'security-{{name}}'
      labels:
        soc.lab/component: argocd
        soc.lab/layer: security
    spec:
      project: default
      source:
        repoURL: https://github.com/ThomasBonan/SOC-as-code.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true       # Phase 8 — purge les ressources retirées de Git
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
