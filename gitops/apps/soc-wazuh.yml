# soc-wazuh.yml — Application ArgoCD Wazuh
# Phase 6 GitOps — ConfigMaps (wazuh-thehive-integration, soc-siem-connector-stub) + ServiceMonitor
# Helm release, Secrets, StatefulSet patch et bootstrap restent Ansible (Day 1)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: soc-wazuh
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: argocd
    soc.lab/layer: application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ThomasBonan/SOC-as-code.git
    targetRevision: main
    path: gitops/environments/lab/wazuh
  destination:
    server: https://kubernetes.default.svc
    namespace: soc-wazuh
  syncPolicy:
    automated:
      prune: false      # Sécurité : pas de suppression automatique tant que la migration n'est pas complète
      selfHeal: true    # Réconciliation automatique si drift détecté
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false   # soc-wazuh doit déjà exister (créé par Ansible / Helm Day 1)
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # Le StatefulSet patch (volumes/mounts/env) est géré par Ansible — ignorer les champs injectés
    - group: apps
      kind: StatefulSet
      name: wazuh-manager-master
      namespace: soc-wazuh
      jsonPointers:
        - /spec/template/metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
