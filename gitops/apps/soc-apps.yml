# soc-apps.yml — ApplicationSet pour les applications SOC
# Génère automatiquement une Application par répertoire dans gitops/environments/lab/
# Apps cibles : toute nouvelle application déposée dans un sous-répertoire non-exclu
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: soc-apps
  namespace: argocd
  labels:
    soc.lab/component: argocd
    soc.lab/managed-by: gitops
spec:
  generators:
    - git:
        repoURL: https://github.com/ThomasBonan/SOC-as-code.git
        revision: main
        directories:
          - path: gitops/environments/lab/*
          # Exclure les répertoires non-applicatifs
          - path: gitops/environments/lab/values-common.yml
            exclude: true
          # Exclure eso/ : géré par soc-eso-externalsecrets (gitops/apps/soc-eso.yml)
          - path: gitops/environments/lab/eso
            exclude: true
          # Exclure risk-engine/ : géré par soc-risk-engine (gitops/apps/soc-risk-engine.yml)
          # avec sync automatique et ignoreDifferences pour kubectl restartedAt
          - path: gitops/environments/lab/risk-engine
            exclude: true
          # Exclure misp/ : géré par soc-misp (gitops/apps/soc-misp.yml)
          - path: gitops/environments/lab/misp
            exclude: true
          # Exclure wazuh/ : géré par soc-wazuh (gitops/apps/soc-wazuh.yml)
          - path: gitops/environments/lab/wazuh
            exclude: true
          # Exclure thehive/ : géré par soc-thehive (gitops/apps/soc-thehive.yml)
          - path: gitops/environments/lab/thehive
            exclude: true
          # Exclure cortex/ : géré par soc-cortex (gitops/apps/soc-cortex.yml)
          - path: gitops/environments/lab/cortex
            exclude: true
          # Exclure shuffle/ : géré par soc-shuffle (gitops/apps/soc-shuffle.yml)
          - path: gitops/environments/lab/shuffle
            exclude: true
          # Exclure monitoring/ : géré par soc-monitoring (gitops/apps/soc-monitoring.yml)
          - path: gitops/environments/lab/monitoring
            exclude: true
          # Exclure netpols/ : géré par soc-netpols (gitops/apps/soc-netpols.yml)
          - path: gitops/environments/lab/netpols
            exclude: true
          # Exclure vault/ : géré par soc-security ApplicationSet (soc-infra.yml)
          - path: gitops/environments/lab/vault
            exclude: true
          # Exclure cert-manager/ : géré par soc-infra ApplicationSet
          - path: gitops/environments/lab/cert-manager
            exclude: true
          # Exclure ingress-nginx/ : géré par soc-infra ApplicationSet
          - path: gitops/environments/lab/ingress-nginx
            exclude: true
  template:
    metadata:
      name: 'soc-{{path.basename}}'
      labels:
        soc.lab/component: argocd
        soc.lab/layer: application
        soc.lab/app: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/ThomasBonan/SOC-as-code.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        # Pas de namespace ici : chaque kustomization.yaml déclare le sien
      syncPolicy:
        automated:
          prune: true       # Phase 8 — purge les ressources retirées de Git
          selfHeal: true    # Réconciliation automatique si drift détecté
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
