# soc-apps.yml — ApplicationSet pour les applications SOC
# Génère automatiquement une Application par répertoire dans gitops/environments/lab/
# Apps cibles : wazuh, misp, cortex, thehive, shuffle, risk-engine, databases
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: soc-apps
  namespace: argocd
  labels:
    soc.lab/component: argocd
    soc.lab/managed-by: gitops
spec:
  generators:
    - git:
        repoURL: https://github.com/ThomasBonan/SOC-as-code.git
        revision: main
        directories:
          - path: gitops/environments/lab/*
          # Exclure les répertoires non-applicatifs
          - path: gitops/environments/lab/values-common.yml
            exclude: true
          # Exclure eso/ : géré par soc-eso-externalsecrets (gitops/apps/soc-eso.yml)
          - path: gitops/environments/lab/eso
            exclude: true
          # Exclure risk-engine/ : géré par soc-risk-engine (gitops/apps/soc-risk-engine.yml)
          # avec sync automatique et ignoreDifferences pour kubectl restartedAt
          - path: gitops/environments/lab/risk-engine
            exclude: true
          # Exclure misp/ : géré par soc-misp (gitops/apps/soc-misp.yml)
          - path: gitops/environments/lab/misp
            exclude: true
  template:
    metadata:
      name: 'soc-{{path.basename}}'
      labels:
        soc.lab/component: argocd
        soc.lab/layer: application
        soc.lab/app: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/ThomasBonan/SOC-as-code.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        # Pas de namespace ici : chaque kustomization.yaml déclare le sien
      syncPolicy:
        # Sync MANUEL par défaut — activer automated après validation de chaque app
        # automated:
        #   prune: false
        #   selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
