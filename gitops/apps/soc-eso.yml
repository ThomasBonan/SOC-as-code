apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: soc-eso-externalsecrets
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: argocd
    soc.lab/layer: security
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ThomasBonan/SOC-as-code.git
    targetRevision: main
    path: gitops/environments/lab/eso
  destination:
    server: https://kubernetes.default.svc
    # Pas de namespace ici : chaque ExternalSecret déclare le sien dans metadata.namespace
  # Ignorer les champs injectés par ESO qui ne sont pas dans nos manifests git
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - ".spec.data[].remoteRef.conversionStrategy"
        - ".spec.data[].remoteRef.decodingStrategy"
        - ".spec.data[].remoteRef.metadataPolicy"
        - ".spec.target.deletionPolicy"
  syncPolicy:
    automated:
      prune: true       # Phase 8 — purge les secrets retirés de Git
      selfHeal: true    # Réconciliation automatique si drift détecté
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=false   # Les namespaces SOC doivent déjà exister
