# soc-shuffle.yml — Application ArgoCD Shuffle SOAR
# Phase 7 GitOps — Ingress shuffle.apps.soc.lab
# Helm release, Secrets, Workflows et configuration restent Ansible (Day 1)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: soc-shuffle
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: argocd
    soc.lab/layer: application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ThomasBonan/SOC-as-code.git
    targetRevision: main
    path: gitops/environments/lab/shuffle
  destination:
    server: https://kubernetes.default.svc
    namespace: soc-shuffle
  syncPolicy:
    automated:
      prune: true       # Phase 8 — purge les ressources retirées de Git
      selfHeal: true    # Réconciliation automatique si drift détecté
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false   # soc-shuffle doit déjà exister (créé par Ansible Day 1)
      - RespectIgnoreDifferences=true
