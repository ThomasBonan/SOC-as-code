# ingress-thehive.yaml — Ingress TLS pour TheHive
# Phase 7 GitOps — Ingresses applicatifs
# Namespace : soc-thehive
#
# Migré depuis ansible/roles/thehive/templates/ingress.thehive.yml.j2
# TLS assuré par cert-manager (soc-lab-ca-issuer).
# Helm release, Secrets et bootstrap restent Ansible (Day 1).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thehive
  namespace: soc-thehive
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    app.kubernetes.io/component: thehive
    soc.lab/playbook: "120-thehive"
    soc.lab/environment: dev
  annotations:
    cert-manager.io/cluster-issuer: "soc-lab-ca-issuer"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-min-tls-version: "TLSv1.2"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - thehive.apps.soc.lab
      secretName: thehive-tls
  rules:
    - host: thehive.apps.soc.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thehive
                port:
                  number: 9000
