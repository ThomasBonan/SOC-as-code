# ingress-risk-engine.yaml — Ingress TLS pour le Risk Engine (accès debug/admin)
# Phase 4 GitOps — Risk Engine
# Namespace : soc-thehive
#
# Expose risk-engine.apps.soc.lab pour les tests manuels et le monitoring externe.
# En production, restreindre l'accès via NetworkPolicy ou annotation whitelist.
#
# Endpoints exposés :
#   GET  https://risk-engine.apps.soc.lab/health  → statut + version politique
#   POST https://risk-engine.apps.soc.lab/score   → calcul de score (JSON)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: risk-engine
  namespace: soc-thehive
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    app.kubernetes.io/component: soc-risk-engine
    soc.lab/playbook: "190-soc-risk-engine"
    soc.lab/environment: dev
  annotations:
    cert-manager.io/cluster-issuer: "soc-lab-ca-issuer"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-min-tls-version: "TLSv1.2"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - risk-engine.apps.soc.lab
      secretName: risk-engine-tls
  rules:
    - host: risk-engine.apps.soc.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: risk-engine-svc
                port:
                  number: 8080
