# netpol-monitoring.yaml — NetworkPolicies pour soc-monitoring
# Migré depuis ansible/roles/monitoring/templates/netpol-monitoring.yml.j2
---
# Règle 1 : Prometheus scrape → pods SOC + Cilium + ArgoCD
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-prometheus-scrape
  namespace: soc-monitoring
  labels:
    app.kubernetes.io/managed-by: soc-gitops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    # Scrape exporters DB dans les namespaces SOC
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc-wazuh
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc-thehive
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc-cortex
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc-core
      ports:
        - protocol: TCP
          port: 9187   # postgres_exporter
        - protocol: TCP
          port: 9104   # mysqld_exporter
        - protocol: TCP
          port: 9121   # redis_exporter
    # Scrape Cilium agents (kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 9090   # cilium-agent
        - protocol: TCP
          port: 8888   # cilium-operator
    # Scrape ArgoCD metrics
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
      ports:
        - protocol: TCP
          port: 8082   # argocd-server metrics
        - protocol: TCP
          port: 8083   # argocd-application-controller metrics
        - protocol: TCP
          port: 8084   # argocd-repo-server metrics
---
# Règle 2 : Grafana → Prometheus + Loki + Wazuh OpenSearch
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-grafana-prometheus
  namespace: soc-monitoring
  labels:
    app.kubernetes.io/managed-by: soc-gitops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
    - to:
        - podSelector:
            matchLabels:
              app: loki
      ports:
        - protocol: TCP
          port: 3100
    # Wazuh OpenSearch
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc-wazuh
      ports:
        - protocol: TCP
          port: 9200
---
# Règle 3 : Ingress nginx → Grafana
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-from-nginx-grafana
  namespace: soc-monitoring
  labels:
    app.kubernetes.io/managed-by: soc-gitops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
# Règle 4 : Blackbox → probes HTTP vers services SOC
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-blackbox-soc-probes
  namespace: soc-monitoring
  labels:
    app.kubernetes.io/managed-by: soc-gitops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus-blackbox-exporter
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc-thehive
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 8080   # risk-engine
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc-cortex
      ports:
        - protocol: TCP
          port: 9001
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc-core
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc-wazuh
      ports:
        - protocol: TCP
          port: 55000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc-shuffle
      ports:
        - protocol: TCP
          port: 5001
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
      ports:
        - protocol: TCP
          port: 8080
---
# Règle 5 : DNS egress pour soc-monitoring
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns
  namespace: soc-monitoring
  labels:
    app.kubernetes.io/managed-by: soc-gitops
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
