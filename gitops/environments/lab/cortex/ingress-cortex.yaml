# ingress-cortex.yaml — Ingress TLS pour Cortex
# Phase 7 GitOps — Ingresses applicatifs
# Namespace : soc-cortex
#
# Migré depuis ansible/roles/cortex/tasks/main.yml (definition inline)
# TLS assuré par cert-manager (soc-lab-ca-issuer).
# Helm release, Secrets et bootstrap restent Ansible (Day 1).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cortex
  namespace: soc-cortex
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    app.kubernetes.io/component: cortex
    soc.lab/playbook: "110-cortex"
    soc.lab/environment: dev
  annotations:
    cert-manager.io/cluster-issuer: "soc-lab-ca-issuer"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-min-tls-version: "TLSv1.2"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cortex.apps.soc.lab
      secretName: cortex-tls
  rules:
    - host: cortex.apps.soc.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cortex
                port:
                  number: 9001
