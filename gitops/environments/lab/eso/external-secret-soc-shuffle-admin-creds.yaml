apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: soc-shuffle-admin-creds
  namespace: soc-shuffle
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: eso-external-secret
  annotations:
    soc.lab/vault-path: "apps/shuffle-admin"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: soc-shuffle-admin-creds
    creationPolicy: Owner
  data:
    - secretKey: apikey
      remoteRef:
        key: apps/shuffle-admin
        property: apikey
    - secretKey: username
      remoteRef:
        key: apps/shuffle-admin
        property: username
