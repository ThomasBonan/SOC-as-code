apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: thehive-postgresql-auth
  namespace: soc-thehive
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: eso-external-secret
  annotations:
    soc.lab/vault-path: "databases/thehive-postgresql"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: thehive-postgresql-auth
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: databases/thehive-postgresql
        property: postgres-password
    - secretKey: password
      remoteRef:
        key: databases/thehive-postgresql
        property: password
