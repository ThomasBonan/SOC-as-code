apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: misp-mariadb-auth
  namespace: soc-core
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: eso-external-secret
  annotations:
    soc.lab/vault-path: "databases/misp-mariadb"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: misp-mariadb-auth
    creationPolicy: Owner
  data:
    - secretKey: mariadb-root-password
      remoteRef:
        key: databases/misp-mariadb
        property: mariadb-root-password
    - secretKey: mariadb-password
      remoteRef:
        key: databases/misp-mariadb
        property: mariadb-password
