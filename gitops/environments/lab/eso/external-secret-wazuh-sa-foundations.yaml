apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wazuh-sa-foundations
  namespace: soc-wazuh
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: eso-external-secret
  annotations:
    soc.lab/vault-path: "service-accounts/wazuh-sa"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: wazuh-sa-foundations
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: service-accounts/wazuh-sa
        property: username
    - secretKey: password
      remoteRef:
        key: service-accounts/wazuh-sa
        property: password
