apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: misp-sa-foundations
  namespace: soc-core
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: eso-external-secret
  annotations:
    soc.lab/vault-path: "service-accounts/misp-sa"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: misp-sa-foundations
    creationPolicy: Owner
  data:
    - secretKey: authkey
      remoteRef:
        key: service-accounts/misp-sa
        property: authkey
    - secretKey: email
      remoteRef:
        key: service-accounts/misp-sa
        property: email
