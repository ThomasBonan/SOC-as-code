apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cortex-secret
  namespace: soc-cortex
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: eso-external-secret
  annotations:
    soc.lab/vault-path: "apps/cortex-secret"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cortex-secret
    creationPolicy: Owner
  data:
    - secretKey: httpSecret
      remoteRef:
        key: apps/cortex-secret
        property: httpSecret
