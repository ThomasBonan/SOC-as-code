apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-admin-creds
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: eso-external-secret
  annotations:
    soc.lab/vault-path: "bootstrap/argocd"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-admin-creds
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: bootstrap/argocd
        property: username
    - secretKey: password
      remoteRef:
        key: bootstrap/argocd
        property: password
