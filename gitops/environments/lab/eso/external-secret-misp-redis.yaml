apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: misp-redis
  namespace: soc-core
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: eso-external-secret
  annotations:
    soc.lab/vault-path: "databases/misp-redis"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: misp-redis
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: databases/misp-redis
        property: redis-password
