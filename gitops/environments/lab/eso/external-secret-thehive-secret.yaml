apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: thehive-secret
  namespace: soc-thehive
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: eso-external-secret
  annotations:
    soc.lab/vault-path: "apps/thehive-secret"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: thehive-secret
    creationPolicy: Owner
  data:
    - secretKey: httpSecret
      remoteRef:
        key: apps/thehive-secret
        property: httpSecret
