apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wazuh-api-cred
  namespace: soc-wazuh
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: eso-external-secret
  annotations:
    soc.lab/vault-path: "credentials/wazuh-api-cred"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: wazuh-api-cred
    creationPolicy: Owner
  data:
    - secretKey: API_USERNAME
      remoteRef:
        key: credentials/wazuh-api-cred
        property: API_USERNAME
    - secretKey: API_PASSWORD
      remoteRef:
        key: credentials/wazuh-api-cred
        property: API_PASSWORD
