apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: soc-automation-worker-creds
  namespace: soc-thehive
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    soc.lab/component: eso-external-secret
  annotations:
    soc.lab/vault-path: "automation/worker-creds"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: soc-automation-worker-creds
    creationPolicy: Owner
  data:
    - secretKey: THEHIVE_URL
      remoteRef:
        key: automation/worker-creds
        property: THEHIVE_URL
    - secretKey: THEHIVE_API_KEY
      remoteRef:
        key: automation/worker-creds
        property: THEHIVE_API_KEY
    - secretKey: THEHIVE_WRITE_KEY
      remoteRef:
        key: automation/worker-creds
        property: THEHIVE_WRITE_KEY
    - secretKey: CORTEX_URL
      remoteRef:
        key: automation/worker-creds
        property: CORTEX_URL
    - secretKey: CORTEX_API_KEY
      remoteRef:
        key: automation/worker-creds
        property: CORTEX_API_KEY
    - secretKey: MISP_URL
      remoteRef:
        key: automation/worker-creds
        property: MISP_URL
    - secretKey: MISP_API_KEY
      remoteRef:
        key: automation/worker-creds
        property: MISP_API_KEY
    - secretKey: WAZUH_USER
      remoteRef:
        key: automation/worker-creds
        property: WAZUH_USER
    - secretKey: WAZUH_PASS
      remoteRef:
        key: automation/worker-creds
        property: WAZUH_PASS
