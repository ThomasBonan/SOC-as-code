# ingress-misp.yaml — Ingress TLS pour MISP
# Phase 5 GitOps — MISP config
# Namespace : soc-core
#
# Note backend-protocol HTTPS : MISP core sert nativement en HTTPS (port 443).
# nginx parle HTTPS vers le pod MISP (upstream-vhost pour le vhost SNI).
# TLS externe (client → nginx) assuré par cert-manager soc-lab-ca-issuer.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: misp
  namespace: soc-core
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    app.kubernetes.io/component: misp
    soc.lab/playbook: "100-misp"
    soc.lab/environment: dev
  annotations:
    cert-manager.io/cluster-issuer: "soc-lab-ca-issuer"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-min-tls-version: "TLSv1.2"
    # Ingress → backend en HTTPS (MISP sert nativement sur 443)
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/upstream-vhost: "misp.apps.soc.lab"
    nginx.ingress.kubernetes.io/proxy-ssl-server-name: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - misp.apps.soc.lab
      secretName: misp-tls
  rules:
    - host: misp.apps.soc.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: misp
                port:
                  number: 443
