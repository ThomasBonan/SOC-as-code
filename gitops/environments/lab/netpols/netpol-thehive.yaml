          podSelector:
            matchLabels:
              app.kubernetes.io/name: cortex
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: soc-cortex
          podSelector:
            matchLabels:
              app: cortex
      ports:
        - protocol: TCP
          port: 9001
