# Règle 3a : TheHive → K8s API (Pekko cluster bootstrap)
# CiliumNetworkPolicy toEntities: kube-apiserver — source: app.kubernetes.io/name=thehive
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-k8s-api-0
  namespace: soc-thehive
  labels:
    app.kubernetes.io/managed-by: soc-gitops
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: thehive
  egress:
    - toEntities:
        - kube-apiserver
---
# Règle 3b : TheHive → K8s API — source: app=thehive
