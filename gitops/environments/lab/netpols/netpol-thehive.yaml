# netpol-thehive.yaml — NetworkPolicies pour le namespace soc-thehive
# Phase 3 GitOps — adopté depuis ansible/roles/soc_netpol
#
# Règles :
#   1. DNS egress (× 2 pod selectors)
#   2. TheHive → Cortex (port 9001, × 2 pod selectors)
#   3. TheHive → K8s API (CiliumNetworkPolicy toEntities, × 2 pod selectors)
#   4. TheHive internal : cassandra, elasticsearch, minio (× 2 sources)
---
# Règle 1a : DNS egress — source: app.kubernetes.io/name=thehive
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns-0
  namespace: soc-thehive
  labels:
    app.kubernetes.io/managed-by: soc-gitops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: thehive
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: coredns
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: coredns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Règle 1b : DNS egress — source: app=thehive
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns-1
  namespace: soc-thehive
  labels:
    app.kubernetes.io/managed-by: soc-gitops
spec:
  podSelector:
