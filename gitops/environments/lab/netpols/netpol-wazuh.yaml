# netpol-wazuh.yaml — NetworkPolicies pour le namespace soc-wazuh
# Phase 3 GitOps — adopté depuis ansible/roles/soc_netpol
#
# Règles :
#   1. DNS egress (× 2 pod selectors)
#   2. Wazuh → TheHive (port 9000, × 2 pod selectors)
#   3. Wazuh internal : manager-api + indexer (× 2 sources)
---
# Règle 1a : DNS egress — source: app=wazuh-manager
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns-0
  namespace: soc-wazuh
  labels:
    app.kubernetes.io/managed-by: soc-gitops
spec:
  podSelector:
    matchLabels:
      app: wazuh-manager
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: coredns
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: coredns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Règle 1b : DNS egress — source: app.kubernetes.io/component=wazuh-manager
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
