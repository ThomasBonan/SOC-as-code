# ingress-shuffle.yaml — Ingress TLS pour Shuffle SOAR
# Phase 7 GitOps — Ingresses applicatifs
# Namespace : soc-shuffle
#
# Migré depuis ansible/roles/shuffle/templates/ingress-shuffle.yml.j2
# TLS assuré par cert-manager (soc-lab-ca-issuer).
# Helm release, Secrets, Workflows et configuration restent Ansible (Day 1).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shuffle
  namespace: soc-shuffle
  labels:
    app.kubernetes.io/managed-by: soc-gitops
    app.kubernetes.io/component: shuffle
    soc.lab/playbook: "185-shuffle"
    soc.lab/environment: dev
  annotations:
    cert-manager.io/cluster-issuer: "soc-lab-ca-issuer"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-min-tls-version: "TLSv1.2"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - shuffle.apps.soc.lab
      secretName: shuffle-tls
  rules:
    - host: shuffle.apps.soc.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shuffle-frontend
                port:
                  number: 80
